"""
Ship-related types
"""

"""
Ship role/purpose
"""
enum ShipRole {
  COMBAT
  MINING
  CARGO
  EXPLORATION
  SALVAGE
  MEDICAL
  SUPPORT
  RACING
  MULTI_ROLE
  GROUND_VEHICLE
  SNUB
  STARTER
}

"""
Ship status
"""
enum ShipStatus {
  OWNED
  PLEDGED
  LOANED
  WANTED
  SOLD
}

"""
Ship manufacturer
"""
type Manufacturer {
  """Manufacturer code"""
  code: String!
  
  """Manufacturer name"""
  name: String!
}

"""
Ship
"""
type Ship {
  """Unique identifier"""
  id: UUID!
  
  """Ship name (user-defined)"""
  name: String
  
  """Ship model name"""
  modelName: String!
  
  """Ship manufacturer"""
  manufacturer: Manufacturer!
  
  """Ship role/purpose"""
  role: ShipRole!
  
  """Ship status"""
  status: ShipStatus!
  
  """Ship size (1-5)"""
  size: Int!
  
  """Maximum crew capacity"""
  maxCrew: Int!
  
  """Minimum crew required"""
  minCrew: Int!
  
  """Cargo capacity (SCU)"""
  cargoCapacity: Int!
  
  """Ship value in aUEC"""
  value: Float
  
  """Whether the ship is insured"""
  isInsured: Boolean!
  
  """Insurance type"""
  insuranceType: String
  
  """Notes about the ship"""
  notes: String
  
  """When the ship was added"""
  createdAt: DateTime!
  
  """When the ship was last updated"""
  updatedAt: DateTime!
  
  """Owner of the ship"""
  owner: User!
  
  """Fleet the ship belongs to (if any)"""
  fleet: Fleet
}

"""
Connection type for ships
"""
type ShipConnection implements Connection {
  """List of ships"""
  nodes: [Ship!]!
  
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of ships"""
  totalCount: Int!
}

"""
Filter input for ships
"""
input ShipFilterInput {
  """Filter by role"""
  role: ShipRole
  
  """Filter by status"""
  status: ShipStatus
  
  """Filter by manufacturer code"""
  manufacturer: String
  
  """Filter by minimum size"""
  minSize: Int
  
  """Filter by maximum size"""
  maxSize: Int
  
  """Search by name or model"""
  search: String
}

"""
Sort field for ships
"""
enum ShipSortField {
  NAME
  MODEL_NAME
  ROLE
  SIZE
  VALUE
  CREATED_AT
}

"""
Sort input for ships
"""
input ShipSortInput {
  """Field to sort by"""
  field: ShipSortField!
  
  """Sort order"""
  order: SortOrder = ASC
}

"""
Input for creating a ship
"""
input CreateShipInput {
  """Ship name (user-defined)"""
  name: String
  
  """Ship model name"""
  modelName: String!
  
  """Ship role/purpose"""
  role: ShipRole!
  
  """Ship status"""
  status: ShipStatus = OWNED
  
  """Ship value in aUEC"""
  value: Float
  
  """Whether the ship is insured"""
  isInsured: Boolean = false
  
  """Insurance type"""
  insuranceType: String
  
  """Notes about the ship"""
  notes: String
  
  """Fleet to assign the ship to"""
  fleetId: UUID
}

"""
Input for updating a ship
"""
input UpdateShipInput {
  """Ship name"""
  name: String
  
  """Ship role"""
  role: ShipRole
  
  """Ship status"""
  status: ShipStatus
  
  """Ship value"""
  value: Float
  
  """Whether the ship is insured"""
  isInsured: Boolean
  
  """Insurance type"""
  insuranceType: String
  
  """Notes"""
  notes: String
  
  """Fleet to assign the ship to"""
  fleetId: UUID
}

"""
Result of ship operations
"""
type ShipResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Ship if successful"""
  ship: Ship
}

"""
Result of deleting a ship
"""
type DeleteShipResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
}
