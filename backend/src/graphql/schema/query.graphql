"""
Root Query type
"""
type Query {
  # ==================
  # User Queries
  # ==================
  
  """Get the currently authenticated user"""
  me: User
  
  """Get a user by ID"""
  user(id: UUID!): User
  
  """Search users by username or RSI handle"""
  searchUsers(query: String!, pagination: PaginationInput): [User!]!
  
  # ==================
  # Organization Queries
  # ==================
  
  """Get organizations the current user belongs to"""
  myOrganizations: [OrganizationMembership!]!
  
  """Get an organization by ID"""
  organization(id: UUID!): Organization
  
  """Get an organization by slug"""
  organizationBySlug(slug: String!): Organization
  
  """Search public organizations"""
  searchOrganizations(query: String!, pagination: PaginationInput): [Organization!]!
  
  # ==================
  # Fleet Queries
  # ==================
  
  """Get fleets for an organization"""
  fleets(
    organizationId: UUID!
    pagination: PaginationInput
    sort: FleetSortInput
  ): FleetConnection!
  
  """Get a fleet by ID"""
  fleet(id: UUID!): Fleet
  
  # ==================
  # Ship Queries
  # ==================
  
  """Get ships for the current user"""
  myShips(
    pagination: PaginationInput
    filter: ShipFilterInput
    sort: ShipSortInput
  ): ShipConnection!
  
  """Get ships for an organization"""
  organizationShips(
    organizationId: UUID!
    pagination: PaginationInput
    filter: ShipFilterInput
    sort: ShipSortInput
  ): ShipConnection!
  
  """Get a ship by ID"""
  ship(id: UUID!): Ship
  
  """Get available ship models"""
  shipModels(manufacturer: String, role: ShipRole): [ShipModel!]!
  
  # ==================
  # Activity Queries
  # ==================
  
  """Get activities for an organization"""
  activities(
    organizationId: UUID!
    pagination: PaginationInput
    filter: ActivityFilterInput
    sort: ActivitySortInput
  ): ActivityConnection!
  
  """Get upcoming activities across all organizations"""
  upcomingActivities(pagination: PaginationInput): ActivityConnection!
  
  """Get an activity by ID"""
  activity(id: UUID!): Activity
  
  """Get activities the current user is participating in"""
  myActivities(
    pagination: PaginationInput
    filter: ActivityFilterInput
  ): ActivityConnection!
}

"""
Ship model information (from game data)
"""
type ShipModel {
  """Model name"""
  name: String!
  
  """Manufacturer"""
  manufacturer: Manufacturer!
  
  """Ship role"""
  role: ShipRole!
  
  """Ship size"""
  size: Int!
  
  """Maximum crew"""
  maxCrew: Int!
  
  """Cargo capacity"""
  cargoCapacity: Int!
  
  """Base price in aUEC"""
  basePrice: Float
}
