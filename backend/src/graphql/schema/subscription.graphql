"""
Root Subscription type
"""
type Subscription {
  # ==================
  # Activity Subscriptions
  # ==================
  
  """Subscribe to activity updates"""
  activityUpdated(organizationId: UUID!): Activity!
  
  """Subscribe to participant updates for an activity"""
  participantUpdated(activityId: UUID!): ActivityParticipant!
  
  # ==================
  # Fleet Subscriptions
  # ==================
  
  """Subscribe to fleet updates"""
  fleetUpdated(organizationId: UUID!): Fleet!
  
  """Subscribe to ship additions/removals in a fleet"""
  fleetShipChanged(fleetId: UUID!): FleetShipChange!
  
  # ==================
  # Organization Subscriptions
  # ==================
  
  """Subscribe to member changes in an organization"""
  memberChanged(organizationId: UUID!): MemberChange!
}

"""
Fleet ship change event
"""
type FleetShipChange {
  """Type of change"""
  type: ChangeType!
  
  """The ship that changed"""
  ship: Ship!
  
  """The fleet"""
  fleet: Fleet!
}

"""
Member change event
"""
type MemberChange {
  """Type of change"""
  type: ChangeType!
  
  """The member that changed"""
  member: OrganizationMember!
  
  """The organization"""
  organization: Organization!
}

"""
Type of change for subscriptions
"""
enum ChangeType {
  ADDED
  UPDATED
  REMOVED
}
