"""
Fleet-related types
"""

"""
Fleet visibility
"""
enum FleetVisibility {
  PUBLIC
  MEMBERS_ONLY
  PRIVATE
}

"""
Fleet
"""
type Fleet {
  """Unique identifier"""
  id: UUID!
  
  """Fleet name"""
  name: String!
  
  """Fleet description"""
  description: String
  
  """Fleet visibility"""
  visibility: FleetVisibility!
  
  """Maximum number of ships in the fleet"""
  maxCapacity: Int!
  
  """When the fleet was created"""
  createdAt: DateTime!
  
  """When the fleet was last updated"""
  updatedAt: DateTime!
  
  """Organization the fleet belongs to"""
  organization: Organization!
  
  """Ships in the fleet"""
  ships(pagination: PaginationInput, filter: ShipFilterInput): ShipConnection!
  
  """Fleet statistics"""
  statistics: FleetStatistics!
  
  """Fleet composition by role"""
  composition: FleetComposition!
}

"""
Fleet statistics
"""
type FleetStatistics {
  """Total number of ships"""
  shipCount: Int!
  
  """Total cargo capacity (SCU)"""
  totalCargoCapacity: Int!
  
  """Total crew capacity"""
  totalCrewCapacity: Int!
  
  """Total value (aUEC)"""
  totalValue: Float!
  
  """Average ship size"""
  averageShipSize: Float!
}

"""
Fleet composition
"""
type FleetComposition {
  """Combat ships count"""
  combat: Int!
  
  """Mining ships count"""
  mining: Int!
  
  """Cargo ships count"""
  cargo: Int!
  
  """Exploration ships count"""
  exploration: Int!
  
  """Salvage ships count"""
  salvage: Int!
  
  """Medical ships count"""
  medical: Int!
  
  """Support ships count"""
  support: Int!
  
  """Multi-role ships count"""
  multiRole: Int!
  
  """Other ships count"""
  other: Int!
}

"""
Connection type for fleets
"""
type FleetConnection implements Connection {
  """List of fleets"""
  nodes: [Fleet!]!
  
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of fleets"""
  totalCount: Int!
}

"""
Sort field for fleets
"""
enum FleetSortField {
  NAME
  SHIP_COUNT
  TOTAL_VALUE
  CREATED_AT
  UPDATED_AT
}

"""
Sort input for fleets
"""
input FleetSortInput {
  """Field to sort by"""
  field: FleetSortField!
  
  """Sort order"""
  order: SortOrder = ASC
}

"""
Input for creating a fleet
"""
input CreateFleetInput {
  """Fleet name"""
  name: String!
  
  """Fleet description"""
  description: String
  
  """Fleet visibility"""
  visibility: FleetVisibility = MEMBERS_ONLY
  
  """Maximum capacity"""
  maxCapacity: Int = 100
}

"""
Input for updating a fleet
"""
input UpdateFleetInput {
  """Fleet name"""
  name: String
  
  """Fleet description"""
  description: String
  
  """Fleet visibility"""
  visibility: FleetVisibility
  
  """Maximum capacity"""
  maxCapacity: Int
}

"""
Result of fleet operations
"""
type FleetResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Fleet if successful"""
  fleet: Fleet
}

"""
Result of deleting a fleet
"""
type DeleteFleetResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
}
