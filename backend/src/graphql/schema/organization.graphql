"""
Organization-related types
"""

"""
Organization member role
"""
enum OrganizationRole {
  OWNER
  ADMIN
  OFFICER
  MEMBER
  GUEST
}

"""
Organization type
"""
type Organization {
  """Unique identifier"""
  id: UUID!
  
  """Organization name"""
  name: String!
  
  """Organization slug (URL-friendly identifier)"""
  slug: String!
  
  """Description"""
  description: String
  
  """Logo URL"""
  logoUrl: String
  
  """Banner URL"""
  bannerUrl: String
  
  """RSI organization ID"""
  rsiOrgId: String
  
  """Whether the organization is verified"""
  isVerified: Boolean!
  
  """Whether the organization is public"""
  isPublic: Boolean!
  
  """When the organization was created"""
  createdAt: DateTime!
  
  """When the organization was last updated"""
  updatedAt: DateTime!
  
  """Organization statistics"""
  statistics: OrganizationStatistics!
  
  """Organization members"""
  members(pagination: PaginationInput, role: OrganizationRole): OrganizationMemberConnection!
  
  """Organization fleets"""
  fleets(pagination: PaginationInput): FleetConnection!
  
  """Organization activities"""
  activities(pagination: PaginationInput, upcoming: Boolean): ActivityConnection!
}

"""
Organization membership
"""
type OrganizationMembership {
  """Member role"""
  role: OrganizationRole!
  
  """The organization"""
  organization: Organization!
  
  """When the user joined"""
  joinedAt: DateTime!
}

"""
Organization member
"""
type OrganizationMember {
  """The user"""
  user: User!
  
  """Member role"""
  role: OrganizationRole!
  
  """When the user joined"""
  joinedAt: DateTime!
}

"""
Organization statistics
"""
type OrganizationStatistics {
  """Total number of members"""
  memberCount: Int!
  
  """Total number of ships"""
  shipCount: Int!
  
  """Total number of fleets"""
  fleetCount: Int!
  
  """Total number of activities"""
  activityCount: Int!
  
  """Total value of all ships (in aUEC)"""
  totalShipValue: Float!
}

"""
Connection type for organization members
"""
type OrganizationMemberConnection implements Connection {
  """List of members"""
  nodes: [OrganizationMember!]!
  
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of members"""
  totalCount: Int!
}

"""
Input for creating an organization
"""
input CreateOrganizationInput {
  """Organization name"""
  name: String!
  
  """Organization slug"""
  slug: String!
  
  """Description"""
  description: String
  
  """RSI organization ID"""
  rsiOrgId: String
  
  """Whether the organization is public"""
  isPublic: Boolean = true
}

"""
Input for updating an organization
"""
input UpdateOrganizationInput {
  """Organization name"""
  name: String
  
  """Description"""
  description: String
  
  """Whether the organization is public"""
  isPublic: Boolean
}

"""
Result of creating/updating an organization
"""
type OrganizationResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Organization if successful"""
  organization: Organization
}

"""
Input for updating a member's role
"""
input UpdateMemberRoleInput {
  """User ID"""
  userId: UUID!
  
  """New role"""
  role: OrganizationRole!
}

"""
Result of member operations
"""
type MemberResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Member if successful"""
  member: OrganizationMember
}
