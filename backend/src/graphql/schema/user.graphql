"""
User-related types
"""

"""
User play style preference
"""
enum PlayStyle {
  CASUAL
  REGULAR
  HARDCORE
  ROLE_PLAYER
}

"""
User timezone
"""
enum Timezone {
  UTC
  US_EASTERN
  US_CENTRAL
  US_PACIFIC
  EU_WESTERN
  EU_CENTRAL
  EU_EASTERN
  ASIA_TOKYO
  ASIA_SINGAPORE
  AUSTRALIA_SYDNEY
}

"""
User profile
"""
type User {
  """Unique identifier"""
  id: UUID!
  
  """Username"""
  username: String!
  
  """Display name"""
  displayName: String
  
  """RSI handle"""
  rsiHandle: String
  
  """Avatar URL"""
  avatarUrl: String
  
  """User play style preference"""
  playStyle: PlayStyle
  
  """User timezone"""
  timezone: Timezone
  
  """Bio/description"""
  bio: String
  
  """Whether the user is verified"""
  isVerified: Boolean!
  
  """When the user was created"""
  createdAt: DateTime!
  
  """When the user was last updated"""
  updatedAt: DateTime!
  
  """Ships owned by the user"""
  ships(pagination: PaginationInput): ShipConnection!
  
  """Organizations the user belongs to"""
  organizations: [OrganizationMembership!]!
  
  """Activities the user is participating in"""
  activities(pagination: PaginationInput): ActivityConnection!
}

"""
Input for updating user profile
"""
input UpdateUserInput {
  """Display name"""
  displayName: String
  
  """RSI handle"""
  rsiHandle: String
  
  """User play style preference"""
  playStyle: PlayStyle
  
  """User timezone"""
  timezone: Timezone
  
  """Bio/description"""
  bio: String
}

"""
Result of updating a user
"""
type UpdateUserResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Updated user if successful"""
  user: User
}
