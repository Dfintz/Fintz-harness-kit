"""
Activity-related types
"""

"""
Activity type
"""
enum ActivityType {
  MINING
  CARGO_HAULING
  COMBAT
  EXPLORATION
  SALVAGE
  MEDICAL
  RACING
  BOUNTY_HUNTING
  TRADING
  ROLEPLAY
  TRAINING
  SOCIAL
  OTHER
}

"""
Activity status
"""
enum ActivityStatus {
  DRAFT
  SCHEDULED
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

"""
Participant status
"""
enum ParticipantStatus {
  INVITED
  CONFIRMED
  DECLINED
  TENTATIVE
  ATTENDED
  NO_SHOW
}

"""
Activity
"""
type Activity {
  """Unique identifier"""
  id: UUID!
  
  """Activity title"""
  title: String!
  
  """Activity description"""
  description: String
  
  """Activity type"""
  type: ActivityType!
  
  """Activity status"""
  status: ActivityStatus!
  
  """When the activity starts"""
  startTime: DateTime!
  
  """When the activity ends"""
  endTime: DateTime
  
  """Estimated duration in minutes"""
  durationMinutes: Int
  
  """Location (e.g., system, planet)"""
  location: String
  
  """Maximum number of participants"""
  maxParticipants: Int
  
  """Whether the activity requires confirmation"""
  requiresConfirmation: Boolean!
  
  """Notes for participants"""
  notes: String
  
  """When the activity was created"""
  createdAt: DateTime!
  
  """When the activity was last updated"""
  updatedAt: DateTime!
  
  """Organization hosting the activity"""
  organization: Organization!
  
  """User who created the activity"""
  organizer: User!
  
  """Activity participants"""
  participants(pagination: PaginationInput, status: ParticipantStatus): ActivityParticipantConnection!
  
  """Activity statistics"""
  statistics: ActivityStatistics!
}

"""
Activity participant
"""
type ActivityParticipant {
  """The user"""
  user: User!
  
  """Participant status"""
  status: ParticipantStatus!
  
  """Role in the activity"""
  role: String
  
  """Ship the participant plans to bring"""
  ship: Ship
  
  """Notes from the participant"""
  notes: String
  
  """When the participant was added"""
  joinedAt: DateTime!
  
  """When the status was last updated"""
  updatedAt: DateTime!
}

"""
Activity statistics
"""
type ActivityStatistics {
  """Total number of participants"""
  totalParticipants: Int!
  
  """Number of confirmed participants"""
  confirmedParticipants: Int!
  
  """Number of declined participants"""
  declinedParticipants: Int!
  
  """Number of tentative participants"""
  tentativeParticipants: Int!
  
  """Remaining spots"""
  remainingSpots: Int
}

"""
Connection type for activities
"""
type ActivityConnection implements Connection {
  """List of activities"""
  nodes: [Activity!]!
  
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of activities"""
  totalCount: Int!
}

"""
Connection type for activity participants
"""
type ActivityParticipantConnection implements Connection {
  """List of participants"""
  nodes: [ActivityParticipant!]!
  
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of participants"""
  totalCount: Int!
}

"""
Filter input for activities
"""
input ActivityFilterInput {
  """Filter by type"""
  type: ActivityType
  
  """Filter by status"""
  status: ActivityStatus
  
  """Filter by start time (after)"""
  startTimeAfter: DateTime
  
  """Filter by start time (before)"""
  startTimeBefore: DateTime
  
  """Only show upcoming activities"""
  upcoming: Boolean
  
  """Search by title or description"""
  search: String
}

"""
Sort field for activities
"""
enum ActivitySortField {
  TITLE
  START_TIME
  TYPE
  STATUS
  CREATED_AT
}

"""
Sort input for activities
"""
input ActivitySortInput {
  """Field to sort by"""
  field: ActivitySortField!
  
  """Sort order"""
  order: SortOrder = ASC
}

"""
Input for creating an activity
"""
input CreateActivityInput {
  """Activity title"""
  title: String!
  
  """Activity description"""
  description: String
  
  """Activity type"""
  type: ActivityType!
  
  """When the activity starts"""
  startTime: DateTime!
  
  """When the activity ends"""
  endTime: DateTime
  
  """Estimated duration in minutes"""
  durationMinutes: Int
  
  """Location"""
  location: String
  
  """Maximum number of participants"""
  maxParticipants: Int
  
  """Whether the activity requires confirmation"""
  requiresConfirmation: Boolean = false
  
  """Notes for participants"""
  notes: String
}

"""
Input for updating an activity
"""
input UpdateActivityInput {
  """Activity title"""
  title: String
  
  """Activity description"""
  description: String
  
  """Activity type"""
  type: ActivityType
  
  """Activity status"""
  status: ActivityStatus
  
  """When the activity starts"""
  startTime: DateTime
  
  """When the activity ends"""
  endTime: DateTime
  
  """Location"""
  location: String
  
  """Maximum number of participants"""
  maxParticipants: Int
  
  """Notes for participants"""
  notes: String
}

"""
Result of activity operations
"""
type ActivityResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Activity if successful"""
  activity: Activity
}

"""
Input for joining an activity
"""
input JoinActivityInput {
  """Participant status"""
  status: ParticipantStatus = CONFIRMED
  
  """Role in the activity"""
  role: String
  
  """Ship to bring"""
  shipId: UUID
  
  """Notes"""
  notes: String
}

"""
Result of joining an activity
"""
type JoinActivityResult implements Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
  
  """Participant if successful"""
  participant: ActivityParticipant
}
