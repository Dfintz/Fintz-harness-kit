"""
Root Mutation type
"""
type Mutation {
  # ==================
  # User Mutations
  # ==================
  
  """Update the current user's profile"""
  updateProfile(input: UpdateUserInput!): UpdateUserResult!
  
  # ==================
  # Organization Mutations
  # ==================
  
  """Create a new organization"""
  createOrganization(input: CreateOrganizationInput!): OrganizationResult!
  
  """Update an organization"""
  updateOrganization(id: UUID!, input: UpdateOrganizationInput!): OrganizationResult!
  
  """Delete an organization"""
  deleteOrganization(id: UUID!): Result!
  
  """Invite a user to an organization"""
  inviteMember(organizationId: UUID!, userId: UUID!, role: OrganizationRole!): MemberResult!
  
  """Update a member's role"""
  updateMemberRole(organizationId: UUID!, input: UpdateMemberRoleInput!): MemberResult!
  
  """Remove a member from an organization"""
  removeMember(organizationId: UUID!, userId: UUID!): Result!
  
  """Leave an organization"""
  leaveOrganization(organizationId: UUID!): Result!
  
  # ==================
  # Fleet Mutations
  # ==================
  
  """Create a new fleet"""
  createFleet(organizationId: UUID!, input: CreateFleetInput!): FleetResult!
  
  """Update a fleet"""
  updateFleet(id: UUID!, input: UpdateFleetInput!): FleetResult!
  
  """Delete a fleet"""
  deleteFleet(id: UUID!): DeleteFleetResult!
  
  """Add a ship to a fleet"""
  addShipToFleet(fleetId: UUID!, shipId: UUID!): FleetResult!
  
  """Remove a ship from a fleet"""
  removeShipFromFleet(fleetId: UUID!, shipId: UUID!): FleetResult!
  
  # ==================
  # Ship Mutations
  # ==================
  
  """Create a new ship"""
  createShip(input: CreateShipInput!): ShipResult!
  
  """Update a ship"""
  updateShip(id: UUID!, input: UpdateShipInput!): ShipResult!
  
  """Delete a ship"""
  deleteShip(id: UUID!): DeleteShipResult!
  
  """Bulk create ships from a list"""
  bulkCreateShips(ships: [CreateShipInput!]!): [ShipResult!]!
  
  # ==================
  # Activity Mutations
  # ==================
  
  """Create a new activity"""
  createActivity(organizationId: UUID!, input: CreateActivityInput!): ActivityResult!
  
  """Update an activity"""
  updateActivity(id: UUID!, input: UpdateActivityInput!): ActivityResult!
  
  """Delete an activity"""
  deleteActivity(id: UUID!): Result!
  
  """Cancel an activity"""
  cancelActivity(id: UUID!): ActivityResult!
  
  """Join an activity"""
  joinActivity(activityId: UUID!, input: JoinActivityInput): JoinActivityResult!
  
  """Leave an activity"""
  leaveActivity(activityId: UUID!): Result!
  
  """Update participation status"""
  updateParticipation(activityId: UUID!, status: ParticipantStatus!): JoinActivityResult!
}
