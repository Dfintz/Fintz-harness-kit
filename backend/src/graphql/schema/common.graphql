"""
Common types and interfaces used across the GraphQL schema
"""

"""
ISO 8601 date-time string
"""
scalar DateTime

"""
UUID string
"""
scalar UUID

"""
Pagination input for list queries
"""
input PaginationInput {
  """Page number (1-indexed)"""
  page: Int = 1
  
  """Number of items per page"""
  limit: Int = 20
}

"""
Sort order
"""
enum SortOrder {
  ASC
  DESC
}

"""
Pagination info for list responses
"""
type PageInfo {
  """Current page number"""
  page: Int!
  
  """Number of items per page"""
  limit: Int!
  
  """Total number of items"""
  total: Int!
  
  """Total number of pages"""
  totalPages: Int!
  
  """Whether there are more pages"""
  hasNextPage: Boolean!
  
  """Whether there are previous pages"""
  hasPreviousPage: Boolean!
}

"""
Generic connection type for paginated results
"""
interface Connection {
  """Pagination information"""
  pageInfo: PageInfo!
  
  """Total count of items"""
  totalCount: Int!
}

"""
Error type for GraphQL errors
"""
type Error {
  """Error code"""
  code: String!
  
  """Human-readable error message"""
  message: String!
  
  """Field that caused the error (for validation errors)"""
  field: String
}

"""
Result type that can be either success or error
"""
interface Result {
  """Whether the operation was successful"""
  success: Boolean!
  
  """Errors if operation failed"""
  errors: [Error!]
}
