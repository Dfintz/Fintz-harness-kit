<!doctype html>
<html>
  <head>
    <title>SC Fleet Manager - Mock Data Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        background: #1a1a2e;
        color: #eee;
      }
      h1 {
        color: #00d9ff;
      }
      h2 {
        color: #00d9ff;
        margin-top: 30px;
      }
      .section {
        background: #16213e;
        padding: 20px;
        margin: 20px 0;
        border-radius: 8px;
        border: 1px solid #00d9ff;
      }
      .item {
        background: #0f0f1e;
        padding: 15px;
        margin: 10px 0;
        border-radius: 4px;
        border-left: 3px solid #00d9ff;
      }
      .badge {
        display: inline-block;
        padding: 5px 10px;
        margin: 5px 5px 5px 0;
        background: #00d9ff;
        color: #0f0f1e;
        border-radius: 3px;
        font-size: 0.9em;
      }
      .badge.closed {
        background: #ff4444;
      }
      .badge.draft {
        background: #ffaa00;
      }
      button {
        background: #00d9ff;
        color: #0f0f1e;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 4px;
        margin: 5px;
      }
      button:hover {
        background: #00b8d9;
      }
      #status {
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      .success {
        background: #44ff44;
        color: #000;
      }
      .error {
        background: #ff4444;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h1>⭐ Star Citizen Fleet Manager - Mock Data Test</h1>
    <div id="status"></div>

    <div class="section">
      <h2>📋 Recruitment Postings</h2>
      <button onclick="loadRecruitments()">Load Recruitments</button>
      <div id="recruitments"></div>
    </div>

    <div class="section">
      <h2>🌐 Organization Websites</h2>
      <button onclick="loadWebsites()">Load Websites</button>
      <div id="websites"></div>
    </div>

    <div class="section">
      <h2>📝 Mission Briefings</h2>
      <button onclick="loadBriefings()">Load Briefings</button>
      <div id="briefings"></div>
    </div>

    <script>
      // CWE-79: DOM XSS Prevention Helpers
      function escapeHtml(unsafe) {
        if (unsafe === null || unsafe === undefined) return '';
        return String(unsafe)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function clearElement(element) {
        while (element.firstChild) {
          element.removeChild(element.firstChild);
        }
      }

      function createBadge(text, extraClass) {
        const badge = document.createElement('span');
        badge.className = 'badge';
        if (extraClass) {
          badge.classList.add(extraClass);
        }
        badge.textContent = escapeHtml(text);
        return badge;
      }

      function showStatus(message, isError = false) {
        const status = document.getElementById('status');
        status.textContent = message;
        status.className = isError ? 'error' : 'success';
        setTimeout(() => (status.textContent = ''), 3000);
      }

      function renderRecruitments(items) {
        const container = document.getElementById('recruitments');
        clearElement(container);

        if (!items || items.length === 0) {
          container.textContent = 'No recruitment postings found';
          return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach(r => {
          const item = document.createElement('div');
          item.className = 'item';

          const heading = document.createElement('h3');
          const title = document.createElement('span');
          title.textContent = escapeHtml(r.title);
          heading.appendChild(title);

          const statusBadge = createBadge(
            r.status || 'unknown',
            r.status === 'closed' ? 'closed' : ''
          );
          statusBadge.style.marginLeft = '8px';
          heading.appendChild(statusBadge);
          item.appendChild(heading);

          const description = document.createElement('p');
          description.textContent = escapeHtml(r.description);
          item.appendChild(description);

          const rolesContainer = document.createElement('div');
          (r.rolesNeeded || []).forEach(role => {
            rolesContainer.appendChild(createBadge(role));
          });
          item.appendChild(rolesContainer);

          const applicants = document.createElement('p');
          const applicantsLabel = document.createElement('strong');
          applicantsLabel.textContent = 'Applicants:';
          applicants.appendChild(applicantsLabel);
          applicants.appendChild(
            document.createTextNode(
              ` ${escapeHtml(r.currentApplicants)}${r.maxPositions ? ' / ' + escapeHtml(r.maxPositions) : ''}`
            )
          );
          item.appendChild(applicants);

          if (r.requirements) {
            const req = document.createElement('p');
            const reqLabel = document.createElement('strong');
            reqLabel.textContent = 'Requirements:';
            req.appendChild(reqLabel);
            req.appendChild(document.createTextNode(` ${escapeHtml(r.requirements)}`));
            item.appendChild(req);
          }

          fragment.appendChild(item);
        });

        container.appendChild(fragment);
      }

      function renderWebsites(items) {
        const container = document.getElementById('websites');
        clearElement(container);

        if (!items || items.length === 0) {
          container.textContent = 'No websites found';
          return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach(w => {
          const item = document.createElement('div');
          item.className = 'item';

          const heading = document.createElement('h3');
          heading.textContent = escapeHtml(w.title) + ' ';
          const statusBadge = createBadge(w.published ? '🟢 Published' : '🔴 Draft');
          heading.appendChild(statusBadge);
          item.appendChild(heading);

          const org = document.createElement('p');
          const orgLabel = document.createElement('strong');
          orgLabel.textContent = 'Organization:';
          org.appendChild(orgLabel);
          org.appendChild(document.createTextNode(` ${escapeHtml(w.organizationId)}`));
          item.appendChild(org);

          const views = document.createElement('p');
          const viewsLabel = document.createElement('strong');
          viewsLabel.textContent = 'Views:';
          views.appendChild(viewsLabel);
          views.appendChild(document.createTextNode(` ${escapeHtml(w.views)}`));
          item.appendChild(views);

          const sections = document.createElement('p');
          const sectionsLabel = document.createElement('strong');
          sectionsLabel.textContent = 'Sections:';
          sections.appendChild(sectionsLabel);
          sections.appendChild(document.createTextNode(` ${escapeHtml(w.sections?.length || 0)}`));
          item.appendChild(sections);

          if (w.theme) {
            const theme = document.createElement('p');
            const themeLabel = document.createElement('strong');
            themeLabel.textContent = 'Theme:';
            theme.appendChild(themeLabel);
            theme.appendChild(
              document.createTextNode(
                ` Primary: ${escapeHtml(w.theme.primaryColor)}, Secondary: ${escapeHtml(w.theme.secondaryColor)}`
              )
            );
            item.appendChild(theme);
          }

          fragment.appendChild(item);
        });

        container.appendChild(fragment);
      }

      function renderBriefings(items) {
        const container = document.getElementById('briefings');
        clearElement(container);

        if (!items || items.length === 0) {
          container.textContent = 'No briefings found';
          return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach(b => {
          const item = document.createElement('div');
          item.className = 'item';

          const heading = document.createElement('h3');
          heading.textContent = escapeHtml(b.title) + ' ';
          const statusBadge = createBadge(
            b.status || 'unknown',
            b.status === 'draft' ? 'draft' : ''
          );
          heading.appendChild(statusBadge);
          item.appendChild(heading);

          const mission = document.createElement('p');
          const missionLabel = document.createElement('strong');
          missionLabel.textContent = 'Mission ID:';
          mission.appendChild(missionLabel);
          mission.appendChild(document.createTextNode(` ${escapeHtml(b.missionId || 'N/A')}`));
          item.appendChild(mission);

          const elements = document.createElement('p');
          const elementsLabel = document.createElement('strong');
          elementsLabel.textContent = 'Elements:';
          elements.appendChild(elementsLabel);
          elements.appendChild(
            document.createTextNode(` ${escapeHtml(b.elements?.length || 0)} drawing elements`)
          );
          item.appendChild(elements);

          const participants = document.createElement('p');
          const participantsLabel = document.createElement('strong');
          participantsLabel.textContent = 'Participants:';
          participants.appendChild(participantsLabel);
          participants.appendChild(
            document.createTextNode(` ${escapeHtml(b.participants ? b.participants.length : 0)}`)
          );
          item.appendChild(participants);

          const version = document.createElement('p');
          const versionLabel = document.createElement('strong');
          versionLabel.textContent = 'Version:';
          version.appendChild(versionLabel);
          version.appendChild(document.createTextNode(` ${escapeHtml(b.version)}`));
          item.appendChild(version);

          if (b.tags && b.tags.length > 0) {
            const tagsContainer = document.createElement('div');
            (b.tags || []).forEach(tag => {
              tagsContainer.appendChild(createBadge(tag));
            });
            item.appendChild(tagsContainer);
          }

          fragment.appendChild(item);
        });

        container.appendChild(fragment);
      }

      async function loadRecruitments() {
        try {
          const response = await fetch('http://localhost:3000/api/recruitments');
          const data = await response.json();
          renderRecruitments(data.data);
          if (data.data && data.data.length > 0) {
            showStatus(`Loaded ${data.data.length} recruitment postings`);
          }
        } catch (error) {
          showStatus('Error loading recruitments: ' + error.message, true);
        }
      }

      async function loadWebsites() {
        try {
          const response = await fetch('http://localhost:3000/api/websites');
          const data = await response.json();
          renderWebsites(data.data);
          if (data.data && data.data.length > 0) {
            showStatus(`Loaded ${data.data.length} websites`);
          }
        } catch (error) {
          showStatus('Error loading websites: ' + error.message, true);
        }
      }

      async function loadBriefings() {
        try {
          const response = await fetch('http://localhost:3000/api/briefings');
          const data = await response.json();
          renderBriefings(data.data);
          if (data.data && data.data.length > 0) {
            showStatus(`Loaded ${data.data.length} briefings`);
          }
        } catch (error) {
          showStatus('Error loading briefings: ' + error.message, true);
        }
      }

      // Auto-load data on page load
      window.onload = () => {
        loadRecruitments();
        loadWebsites();
        loadBriefings();
      };
    </script>
  </body>
</html>
