# Common Parameters Index

OrganizationId:
  name: organizationId
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: Organization unique identifier

FleetId:
  name: fleetId
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: Fleet unique identifier

ActivityId:
  name: activityId
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: Activity unique identifier

UserId:
  name: userId
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: User unique identifier

ShipId:
  name: shipId
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: Ship unique identifier

Page:
  name: page
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1
  description: Page number for pagination

Limit:
  name: limit
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
  description: Number of items per page

Search:
  name: search
  in: query
  required: false
  schema:
    type: string
    maxLength: 100
  description: Search query string

SortBy:
  name: sortBy
  in: query
  required: false
  schema:
    type: string
  description: Field to sort by

SortOrder:
  name: sortOrder
  in: query
  required: false
  schema:
    type: string
    enum: [asc, desc]
    default: desc
  description: Sort order (ascending or descending)
