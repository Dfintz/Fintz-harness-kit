# Mining Operations API Paths

/api/v2/mining-operations:
  get:
    tags:
      - Mining
    summary: List mining operations
    operationId: listMiningOperations
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        schema:
          type: string
          enum: [planned, active, completed, cancelled]
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 20
    responses:
      '200':
        description: List of mining operations

  post:
    tags:
      - Mining
    summary: Create mining operation
    operationId: createMiningOperation
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, location]
            properties:
              name:
                type: string
              description:
                type: string
              location:
                type: string
              estimatedYield:
                type: number
              participants:
                type: array
                items:
                  type: string
                  format: uuid
    responses:
      '201':
        description: Mining operation created

/api/v2/mining-operations/{operationId}:
  get:
    tags:
      - Mining
    summary: Get mining operation details
    operationId: getMiningOperation
    security:
      - bearerAuth: []
    parameters:
      - name: operationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Mining operation details

  put:
    tags:
      - Mining
    summary: Update mining operation
    operationId: updateMiningOperation
    security:
      - bearerAuth: []
    parameters:
      - name: operationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: [planned, active, completed, cancelled]
              actualYield:
                type: number
    responses:
      '200':
        description: Mining operation updated

  delete:
    tags:
      - Mining
    summary: Delete mining operation
    operationId: deleteMiningOperation
    security:
      - bearerAuth: []
    parameters:
      - name: operationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Mining operation deleted
