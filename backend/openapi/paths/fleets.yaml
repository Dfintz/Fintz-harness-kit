# Fleet API Paths

organizationFleets:
  get:
    tags:
      - Fleets
    summary: List organization fleets
    description: Get all fleets for an organization with pagination
    operationId: listOrganizationFleets
    parameters:
      - $ref: '../parameters/_index.yaml#/OrganizationId'
      - $ref: '../parameters/_index.yaml#/Page'
      - $ref: '../parameters/_index.yaml#/Limit'
      - $ref: '../parameters/_index.yaml#/Search'
    responses:
      '200':
        description: List of fleets
        content:
          application/json:
            schema:
              $ref: '../schemas/fleet.yaml#/FleetListResponse'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  post:
    tags:
      - Fleets
    summary: Create a new fleet
    description: Create a new fleet for the organization
    operationId: createFleet
    parameters:
      - $ref: '../parameters/_index.yaml#/OrganizationId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/fleet.yaml#/CreateFleetRequest'
    responses:
      '201':
        description: Fleet created
        content:
          application/json:
            schema:
              $ref: '../schemas/fleet.yaml#/FleetResponse'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

fleet:
  get:
    tags:
      - Fleets
    summary: Get fleet by ID
    description: Get detailed information about a specific fleet
    operationId: getFleetById
    parameters:
      - $ref: '../parameters/_index.yaml#/FleetId'
    responses:
      '200':
        description: Fleet details
        content:
          application/json:
            schema:
              $ref: '../schemas/fleet.yaml#/FleetResponse'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  put:
    tags:
      - Fleets
    summary: Update fleet
    description: Update fleet details
    operationId: updateFleet
    parameters:
      - $ref: '../parameters/_index.yaml#/FleetId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/fleet.yaml#/UpdateFleetRequest'
    responses:
      '200':
        description: Fleet updated
        content:
          application/json:
            schema:
              $ref: '../schemas/fleet.yaml#/FleetResponse'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  delete:
    tags:
      - Fleets
    summary: Delete fleet
    description: Delete a fleet
    operationId: deleteFleet
    parameters:
      - $ref: '../parameters/_index.yaml#/FleetId'
    responses:
      '204':
        $ref: '../responses/_index.yaml#/NoContent'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'

fleetShips:
  get:
    tags:
      - Fleets
    summary: Get fleet ships
    description: Get all ships assigned to a fleet
    operationId: getFleetShips
    parameters:
      - $ref: '../parameters/_index.yaml#/FleetId'
      - $ref: '../parameters/_index.yaml#/Page'
      - $ref: '../parameters/_index.yaml#/Limit'
    responses:
      '200':
        description: List of ships
        content:
          application/json:
            schema:
              $ref: '../schemas/ship.yaml#/ShipListResponse'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'

fleetComposition:
  get:
    tags:
      - Fleets
    summary: Get fleet composition
    description: Get detailed fleet composition analysis
    operationId: getFleetComposition
    parameters:
      - $ref: '../parameters/_index.yaml#/FleetId'
    responses:
      '200':
        description: Fleet composition analysis
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                data:
                  $ref: '../schemas/fleet.yaml#/FleetComposition'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
