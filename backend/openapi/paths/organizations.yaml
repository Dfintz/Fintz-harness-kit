# Organization API Paths

listOrganizations:
  get:
    tags:
      - Organizations
    summary: List organizations
    description: Returns organizations the user is a member of
    operationId: listOrganizations
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Organizations retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                organizations:
                  type: array
                  items:
                    $ref: '../schemas/organization.yaml#/OrganizationV2'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

createOrganization:
  post:
    tags:
      - Organizations
    summary: Create organization
    description: Create a new organization
    operationId: createOrganization
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
            properties:
              name:
                type: string
                minLength: 3
                maxLength: 100
              description:
                type: string
                maxLength: 500
              spectrum_id:
                type: string
              website:
                type: string
                format: uri
              avatar:
                type: string
                format: uri
    responses:
      '201':
        description: Organization created
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

organizationById:
  get:
    tags:
      - Organizations
    summary: Get organization by ID
    description: Returns organization details
    operationId: getOrganizationById
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Organization retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationV2'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
  
  patch:
    tags:
      - Organizations
    summary: Update organization
    description: Update organization details
    operationId: updateOrganization
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 3
                maxLength: 100
              description:
                type: string
                maxLength: 500
              spectrum_id:
                type: string
              website:
                type: string
                format: uri
              avatar:
                type: string
                format: uri
    responses:
      '200':
        description: Organization updated
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
  
  delete:
    tags:
      - Organizations
    summary: Delete organization
    description: Delete an organization (owner only)
    operationId: deleteOrganization
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Organization deleted
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

organizationMembers:
  get:
    tags:
      - Organizations
    summary: List organization members
    description: Returns members of an organization
    operationId: listOrganizationMembers
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Members retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  type: array
                  items:
                    $ref: '../schemas/organization.yaml#/OrganizationMember'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
  
  post:
    tags:
      - Organizations
    summary: Add organization member
    description: Add a user to the organization
    operationId: addOrganizationMember
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
                format: uuid
              role:
                type: string
                enum: [owner, admin, member]
                default: member
    responses:
      '201':
        description: Member added
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationMember'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

organizationMember:
  patch:
    tags:
      - Organizations
    summary: Update member role
    description: Update a member's role in the organization
    operationId: updateOrganizationMember
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: memberId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - role
            properties:
              role:
                type: string
                enum: [owner, admin, member]
    responses:
      '200':
        description: Member updated
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationMember'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
  
  delete:
    tags:
      - Organizations
    summary: Remove member
    description: Remove a member from the organization
    operationId: removeOrganizationMember
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: memberId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Member removed
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

organizationStatistics:
  get:
    tags:
      - Organizations
    summary: Get organization statistics
    description: Returns aggregated statistics for the organization
    operationId: getOrganizationStatistics
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Statistics retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/organization.yaml#/OrganizationStatistics'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
