# Bounties API Paths

/api/v2/bounties:
  get:
    tags:
      - Bounties
    summary: List bounties
    description: Get bounties for the organization bounty board
    operationId: listBounties
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        schema:
          type: string
          enum: [open, claimed, completed, expired, cancelled]
      - name: type
        in: query
        schema:
          type: string
          enum: [kill, capture, intel, escort, rescue]
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 20
    responses:
      '200':
        description: List of bounties

  post:
    tags:
      - Bounties
    summary: Create bounty
    operationId: createBounty
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, type, reward]
            properties:
              title:
                type: string
              description:
                type: string
              type:
                type: string
                enum: [kill, capture, intel, escort, rescue]
              targetType:
                type: string
                enum: [player, npc, location, cargo]
              reward:
                type: number
              difficulty:
                type: string
                enum: [easy, medium, hard, extreme]
              expiresAt:
                type: string
                format: date-time
    responses:
      '201':
        description: Bounty created

/api/v2/bounties/{bountyId}:
  get:
    tags:
      - Bounties
    summary: Get bounty details
    operationId: getBounty
    security:
      - bearerAuth: []
    parameters:
      - name: bountyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Bounty details

  put:
    tags:
      - Bounties
    summary: Update bounty
    operationId: updateBounty
    security:
      - bearerAuth: []
    parameters:
      - name: bountyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Bounty updated

  delete:
    tags:
      - Bounties
    summary: Cancel bounty
    operationId: cancelBounty
    security:
      - bearerAuth: []
    parameters:
      - name: bountyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Bounty cancelled

/api/v2/bounties/{bountyId}/claim:
  post:
    tags:
      - Bounties
    summary: Claim bounty
    description: Claim a bounty for completion
    operationId: claimBounty
    security:
      - bearerAuth: []
    parameters:
      - name: bountyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              evidence:
                type: string
    responses:
      '200':
        description: Bounty claimed

/api/v2/bounties/{bountyId}/complete:
  post:
    tags:
      - Bounties
    summary: Complete bounty
    description: Mark a claimed bounty as completed (requires bounty owner)
    operationId: completeBounty
    security:
      - bearerAuth: []
    parameters:
      - name: bountyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Bounty completed, reward issued
