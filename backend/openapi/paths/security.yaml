# Security API Paths (2FA, WebAuthn, API Keys)

/api/v2/2fa/setup:
  post:
    tags:
      - Security
    summary: Set up TOTP 2FA
    description: Generate TOTP secret and QR code for two-factor authentication setup
    operationId: setup2fa
    security:
      - bearerAuth: []
    responses:
      '200':
        description: TOTP setup data
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                qrCodeUrl:
                  type: string
                backupCodes:
                  type: array
                  items:
                    type: string

/api/v2/2fa/verify:
  post:
    tags:
      - Security
    summary: Verify TOTP code
    description: Verify a TOTP code to complete 2FA setup or authenticate
    operationId: verify2fa
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code]
            properties:
              code:
                type: string
                pattern: '^\d{6}$'
    responses:
      '200':
        description: Code verified
      '401':
        description: Invalid code

/api/v2/2fa/disable:
  post:
    tags:
      - Security
    summary: Disable 2FA
    operationId: disable2fa
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code]
            properties:
              code:
                type: string
    responses:
      '200':
        description: 2FA disabled

/api/v2/2fa/backup-codes:
  post:
    tags:
      - Security
    summary: Regenerate backup codes
    operationId: regenerateBackupCodes
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [code]
            properties:
              code:
                type: string
    responses:
      '200':
        description: New backup codes generated
        content:
          application/json:
            schema:
              type: object
              properties:
                backupCodes:
                  type: array
                  items:
                    type: string

/api/v2/webauthn/register/options:
  post:
    tags:
      - Security
    summary: Get WebAuthn registration options
    operationId: getWebAuthnRegisterOptions
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Registration challenge options

/api/v2/webauthn/register/verify:
  post:
    tags:
      - Security
    summary: Verify WebAuthn registration
    operationId: verifyWebAuthnRegistration
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
    responses:
      '200':
        description: Passkey registered

/api/v2/webauthn/authenticate/options:
  post:
    tags:
      - Security
    summary: Get WebAuthn authentication options
    operationId: getWebAuthnAuthOptions
    responses:
      '200':
        description: Authentication challenge options

/api/v2/webauthn/authenticate/verify:
  post:
    tags:
      - Security
    summary: Verify WebAuthn authentication
    operationId: verifyWebAuthnAuth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
    responses:
      '200':
        description: Authentication successful

/api/v2/webauthn/credentials:
  get:
    tags:
      - Security
    summary: List passkeys
    operationId: listPasskeys
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of registered passkeys

/api/v2/webauthn/credentials/{credentialId}:
  delete:
    tags:
      - Security
    summary: Delete passkey
    operationId: deletePasskey
    security:
      - bearerAuth: []
    parameters:
      - name: credentialId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Passkey deleted

/api/v2/api-keys:
  get:
    tags:
      - Security
    summary: List API keys
    operationId: listApiKeys
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of API keys

  post:
    tags:
      - Security
    summary: Create API key
    operationId: createApiKey
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name:
                type: string
              scopes:
                type: array
                items:
                  type: string
              expiresAt:
                type: string
                format: date-time
    responses:
      '201':
        description: API key created (key only shown once)

/api/v2/api-keys/{keyId}:
  delete:
    tags:
      - Security
    summary: Revoke API key
    operationId: revokeApiKey
    security:
      - bearerAuth: []
    parameters:
      - name: keyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: API key revoked
