# Intel Vault Endpoints
# Secure intelligence storage system with role-based access control

# Access check endpoint
checkAccess:
  get:
    tags:
      - Intel Vault
    summary: Check user's Intel vault access
    description: |
      Check if the current user has access to the Intel vault for the specified organization.
      Returns access level information including whether user is owner, intel officer, and their rank.
    operationId: checkIntelAccess
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
    responses:
      '200':
        description: Access check result
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelAccessCheck'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []

# Intel entries collection
entries:
  get:
    tags:
      - Intel Vault
    summary: Get Intel entries
    description: |
      Retrieve Intel entries for the specified organization with optional filtering.
      Results are filtered based on user's clearance level.
    operationId: getIntelEntries
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for pagination
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        description: Number of entries per page
      - name: includeArchived
        in: query
        schema:
          type: string
          enum: ['true', 'false']
          default: 'false'
        description: Include archived entries in results
      - name: classification
        in: query
        schema:
          $ref: '../schemas/intel.yaml#/IntelClassification'
        description: Filter by classification level
      - name: category
        in: query
        schema:
          $ref: '../schemas/intel.yaml#/IntelCategory'
        description: Filter by category
      - name: search
        in: query
        schema:
          type: string
          maxLength: 200
        description: Search term for title, content, or tags
    responses:
      '200':
        description: List of Intel entries
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  items:
                    $ref: '../schemas/intel.yaml#/IntelEntry'
                total:
                  type: integer
                  description: Total count of matching entries
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []
  
  post:
    tags:
      - Intel Vault
    summary: Create Intel entry
    description: |
      Create a new Intel entry. User must have write permission and appropriate clearance
      for the specified classification level.
    operationId: createIntelEntry
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/intel.yaml#/CreateIntelEntry'
    responses:
      '201':
        description: Intel entry created successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelEntry'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []

# Single Intel entry
entry:
  get:
    tags:
      - Intel Vault
    summary: Get single Intel entry
    description: |
      Retrieve a specific Intel entry. Access is logged for audit purposes.
      User must have appropriate clearance for the entry's classification level.
    operationId: getIntelEntry
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: entryId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel entry ID
    responses:
      '200':
        description: Intel entry details
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelEntry'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []
  
  patch:
    tags:
      - Intel Vault
    summary: Update Intel entry
    description: |
      Update an existing Intel entry. User must have edit permission and appropriate
      clearance for both current and new classification levels.
    operationId: updateIntelEntry
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: entryId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel entry ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/intel.yaml#/UpdateIntelEntry'
    responses:
      '200':
        description: Intel entry updated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelEntry'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []
  
  delete:
    tags:
      - Intel Vault
    summary: Delete Intel entry
    description: |
      Delete an Intel entry. User must have delete permission and appropriate clearance.
      Deletion is logged for audit purposes.
    operationId: deleteIntelEntry
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: entryId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel entry ID
    responses:
      '204':
        description: Intel entry deleted successfully
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []

# Intel officers collection
officers:
  get:
    tags:
      - Intel Vault
    summary: Get Intel officers
    description: Retrieve all Intel officers for the organization.
    operationId: getIntelOfficers
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: includeInactive
        in: query
        schema:
          type: string
          enum: ['true', 'false']
          default: 'false'
        description: Include inactive officers
      - name: rank
        in: query
        schema:
          $ref: '../schemas/intel.yaml#/IntelOfficerRank'
        description: Filter by rank
    responses:
      '200':
        description: List of Intel officers
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/intel.yaml#/IntelOfficer'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []
  
  post:
    tags:
      - Intel Vault
    summary: Appoint Intel officer
    description: |
      Appoint a new Intel officer. Only organization owners can appoint officers.
      Only one Chief officer is allowed per organization.
    operationId: appointIntelOfficer
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/intel.yaml#/AppointIntelOfficer'
    responses:
      '201':
        description: Intel officer appointed successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelOfficer'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []

# Single Intel officer
officer:
  get:
    tags:
      - Intel Vault
    summary: Get single Intel officer
    description: Retrieve details of a specific Intel officer.
    operationId: getIntelOfficer
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: officerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel officer ID
    responses:
      '200':
        description: Intel officer details
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelOfficer'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []
  
  patch:
    tags:
      - Intel Vault
    summary: Update Intel officer
    description: |
      Update an Intel officer's rank, access level, or specializations.
      Only organization owners can update officers.
    operationId: updateIntelOfficer
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: officerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel officer ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/intel.yaml#/UpdateIntelOfficer'
    responses:
      '200':
        description: Intel officer updated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/intel.yaml#/IntelOfficer'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []
  
  delete:
    tags:
      - Intel Vault
    summary: Remove Intel officer
    description: |
      Remove an Intel officer. Only organization owners can remove officers.
      A reason can be provided for audit purposes.
    operationId: removeIntelOfficer
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: officerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Intel officer ID
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
                maxLength: 500
                description: Reason for removal
    responses:
      '204':
        description: Intel officer removed successfully
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
    security:
      - bearerAuth: []

# Audit logs
auditLogs:
  get:
    tags:
      - Intel Vault
    summary: Get audit logs
    description: |
      Retrieve Intel vault audit logs. Only organization owners and the highest
      ranking Intel officer can view audit logs.
      
      Logs are retained for 30 days by default (configurable via INTEL_AUDIT_LOG_RETENTION_DAYS).
    operationId: getIntelAuditLogs
    parameters:
      - $ref: '../parameters/_index.yaml#/organizationIdPath'
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        description: Entries per page
      - name: intelEntryId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by Intel entry ID
      - name: action
        in: query
        schema:
          $ref: '../schemas/intel.yaml#/IntelAuditAction'
        description: Filter by action type
      - name: userId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by user ID
      - name: startDate
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs from this date
      - name: endDate
        in: query
        schema:
          type: string
          format: date-time
        description: Filter logs until this date
    responses:
      '200':
        description: List of audit logs
        content:
          application/json:
            schema:
              type: object
              properties:
                logs:
                  type: array
                  items:
                    $ref: '../schemas/intel.yaml#/IntelAuditLog'
                total:
                  type: integer
                  description: Total count of matching logs
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
    security:
      - bearerAuth: []
