# Events API Paths

/api/v2/events:
  post:
    tags:
      - Events
    summary: Create event
    description: Create a new event for an organization
    operationId: createEvent
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, date, organizationId]
            properties:
              title:
                type: string
              description:
                type: string
              date:
                type: string
                format: date-time
              endDate:
                type: string
                format: date-time
              location:
                type: string
              organizationId:
                type: string
                format: uuid
              maxAttendees:
                type: integer
              isRecurring:
                type: boolean
    responses:
      '201':
        description: Event created
        content:
          application/json:
            schema:
              $ref: '../schemas/event.yaml#/Event'
      '400':
        description: Validation error
      '401':
        description: Not authenticated

  get:
    tags:
      - Events
    summary: List user's events
    description: Get events for the authenticated user across organizations
    operationId: getMyEvents
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 20
      - name: upcoming
        in: query
        schema:
          type: boolean
    responses:
      '200':
        description: List of events
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/event.yaml#/Event'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        description: Not authenticated

/api/v2/events/{eventId}:
  get:
    tags:
      - Events
    summary: Get event by ID
    operationId: getEventById
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Event details
        content:
          application/json:
            schema:
              $ref: '../schemas/event.yaml#/Event'
      '404':
        description: Event not found

  put:
    tags:
      - Events
    summary: Update event
    operationId: updateEvent
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              date:
                type: string
                format: date-time
              location:
                type: string
              maxAttendees:
                type: integer
    responses:
      '200':
        description: Event updated
      '404':
        description: Event not found

  delete:
    tags:
      - Events
    summary: Delete event
    operationId: deleteEvent
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Event deleted
      '404':
        description: Event not found

/api/v2/events/{eventId}/attendees:
  post:
    tags:
      - Events
    summary: RSVP to event
    operationId: rsvpToEvent
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [attending, tentative, declined]
              shipName:
                type: string
              shipType:
                type: string
    responses:
      '200':
        description: RSVP recorded

  get:
    tags:
      - Events
    summary: List event attendees
    operationId: getEventAttendees
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: List of attendees

/api/v2/events/{eventId}/waitlist:
  get:
    tags:
      - Events
    summary: Get event waitlist
    operationId: getEventWaitlist
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Waitlist entries

/api/v2/events/{eventId}/conflicts:
  get:
    tags:
      - Events
    summary: Check event scheduling conflicts
    operationId: getEventConflicts
    security:
      - bearerAuth: []
    parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Scheduling conflicts for this event
