# User API Paths

myProfile:
  get:
    tags:
      - Users
    summary: Get my profile
    description: Returns the authenticated user's profile
    operationId: getMyProfile
    responses:
      '200':
        description: Profile retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserV2'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

updateProfile:
  patch:
    tags:
      - Users
    summary: Update my profile
    description: Updates the authenticated user's profile
    operationId: updateMyProfile
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              displayName:
                type: string
                minLength: 3
                maxLength: 100
              avatar:
                type: string
                format: uri
              bio:
                type: string
                maxLength: 500
              preferences:
                type: object
    responses:
      '200':
        description: Profile updated successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

userById:
  get:
    tags:
      - Users
    summary: Get user by ID
    description: Returns a user's public profile
    operationId: getUserById
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: User retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/User'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

searchUsers:
  get:
    tags:
      - Users
    summary: Search users
    description: Search for users by username or email
    operationId: searchUsers
    parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 3
        description: Search query
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
    responses:
      '200':
        description: Search results
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '../schemas/user.yaml#/User'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

passwordReset:
  post:
    tags:
      - Users
    summary: Request password reset
    description: Send password reset email to user
    operationId: requestPasswordReset
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      '200':
        description: Password reset email sent
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'

verifyResetToken:
  get:
    tags:
      - Users
    summary: Verify password reset token
    description: Verify that a password reset token is valid
    operationId: verifyResetToken
    security: []
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Token is valid
        content:
          application/json:
            schema:
              type: object
              properties:
                valid:
                  type: boolean
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'

resetPassword:
  post:
    tags:
      - Users
    summary: Reset password
    description: Reset user password with valid token
    operationId: resetPassword
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
              - password
            properties:
              token:
                type: string
              password:
                type: string
                minLength: 8
                maxLength: 100
    responses:
      '200':
        description: Password reset successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
