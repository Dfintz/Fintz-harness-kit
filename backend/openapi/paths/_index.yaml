# Paths Index - Aggregates all API paths

# Health endpoints
/health:
  get:
    tags:
      - Health
    summary: Basic health check
    description: Returns basic health status of the API
    operationId: getHealth
    security: []
    responses:
      '200':
        description: System is healthy
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [OK, DEGRADED, ERROR]
                timestamp:
                  type: string
                  format: date-time
                uptime:
                  type: number
                environment:
                  type: string
                database:
                  type: string
      '503':
        $ref: '../responses/_index.yaml#/ServiceUnavailable'

/health/system:
  get:
    tags:
      - Health
    summary: Comprehensive system health
    description: Returns detailed health status of all system components
    operationId: getSystemHealth
    security: []
    responses:
      '200':
        description: Health status retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SystemHealth'
      '503':
        description: System is degraded or unhealthy
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SystemHealth'

/health/component/{name}:
  get:
    tags:
      - Health
    summary: Component health check
    description: Returns health status of a specific component
    operationId: getComponentHealth
    security: []
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Component name
    responses:
      '200':
        description: Component health status
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  type: string
                status:
                  type: string
                  enum: [OK, DEGRADED, ERROR]
                message:
                  type: string
      '404':
        $ref: '../responses/_index.yaml#/NotFound'

# Authentication endpoints
/api/auth/login:
  post:
    tags:
      - Authentication
    summary: User login
    description: Authenticate user and return tokens
    operationId: login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - password
            properties:
              username:
                type: string
              password:
                type: string
                format: password
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
                refreshToken:
                  type: string
                user:
                  $ref: '../schemas/user.yaml#/User'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

/api/auth/refresh:
  post:
    tags:
      - Authentication
    summary: Refresh access token
    description: Get a new access token using refresh token
    operationId: refreshToken
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      '200':
        description: Token refreshed
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

/api/auth/logout:
  post:
    tags:
      - Authentication
    summary: Logout current session
    description: Invalidate current access token
    operationId: logout
    responses:
      '204':
        $ref: '../responses/_index.yaml#/NoContent'

/api/auth/logout-all:
  post:
    tags:
      - Authentication
    summary: Logout all sessions
    description: Invalidate all user sessions
    operationId: logoutAll
    responses:
      '204':
        $ref: '../responses/_index.yaml#/NoContent'

/api/auth/sessions:
  get:
    tags:
      - Authentication
    summary: List active sessions
    description: Get all active sessions for current user
    operationId: listSessions
    responses:
      '200':
        description: Sessions retrieved
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  lastActivity:
                    type: string
                    format: date-time
                  ipAddress:
                    type: string
                  userAgent:
                    type: string

