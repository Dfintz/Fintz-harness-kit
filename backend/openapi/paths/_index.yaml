      '200':
        description: Search results
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/user.yaml#/User'

/api/auth/forgot-password:
  post:
    tags:
      - Authentication
    summary: Request password reset
    operationId: forgotPassword
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      '200':
        description: Reset email sent
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

/api/auth/reset-password/{token}:
  get:
    tags:
      - Authentication
    summary: Verify reset token
    operationId: verifyResetToken
    security: []
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Token is valid
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'

/api/auth/reset-password:
  post:
    tags:
      - Authentication
    summary: Reset password
    operationId: resetPassword
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
              - newPassword
            properties:
              token:
                type: string
              newPassword:
                type: string
                format: password
    responses:
      '200':
        description: Password reset successful
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'

