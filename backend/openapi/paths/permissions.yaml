# Permissions & Roles API Paths

/api/v2/permissions:
  get:
    tags:
      - Permissions
    summary: List permissions
    description: List all available permissions in the system
    operationId: listPermissions
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of permissions

/api/v2/permissions/{permissionId}:
  get:
    tags:
      - Permissions
    summary: Get permission details
    operationId: getPermission
    security:
      - bearerAuth: []
    parameters:
      - name: permissionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Permission details

/api/v2/permissions/check:
  post:
    tags:
      - Permissions
    summary: Check user permission
    description: Check if the authenticated user has a specific permission
    operationId: checkPermission
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [permission, organizationId]
            properties:
              permission:
                type: string
              organizationId:
                type: string
                format: uuid
    responses:
      '200':
        description: Permission check result
        content:
          application/json:
            schema:
              type: object
              properties:
                allowed:
                  type: boolean

/api/v2/permissions/user/{userId}:
  get:
    tags:
      - Permissions
    summary: Get user's permissions
    operationId: getUserPermissions
    security:
      - bearerAuth: []
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: User permission list

/api/v2/permissions/role/{roleId}:
  post:
    tags:
      - Permissions
    summary: Assign permission to role
    operationId: assignPermissionToRole
    security:
      - bearerAuth: []
    parameters:
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [permissionId]
            properties:
              permissionId:
                type: string
                format: uuid
    responses:
      '200':
        description: Permission assigned

  delete:
    tags:
      - Permissions
    summary: Remove permission from role
    operationId: removePermissionFromRole
    security:
      - bearerAuth: []
    parameters:
      - name: roleId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Permission removed

/api/v2/permissions/security-levels:
  post:
    tags:
      - Permissions
    summary: Set inter-org security level
    description: Set data sharing security level between organizations
    operationId: setInterOrgSecurityLevel
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [targetOrganizationId, level]
            properties:
              targetOrganizationId:
                type: string
                format: uuid
              level:
                type: string
                enum: [none, basic, standard, trusted, allied]
    responses:
      '200':
        description: Security level set

  get:
    tags:
      - Permissions
    summary: Get all inter-org security levels
    operationId: getAllSecurityLevels
    security:
      - bearerAuth: []
    responses:
      '200':
        description: All inter-org security levels

  delete:
    tags:
      - Permissions
    summary: Revoke inter-org security level
    operationId: revokeInterOrgSecurityLevel
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Security level revoked

/api/v2/roles:
  get:
    tags:
      - Permissions
    summary: List organization roles
    operationId: listRoles
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of roles

  post:
    tags:
      - Permissions
    summary: Create custom role
    operationId: createRole
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, organizationId]
            properties:
              name:
                type: string
              description:
                type: string
              organizationId:
                type: string
                format: uuid
              permissions:
                type: array
                items:
                  type: string
    responses:
      '201':
        description: Role created
