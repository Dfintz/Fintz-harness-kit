# Recruitment API Paths

/api/v2/recruitment/listings:
  get:
    tags:
      - Recruitment
    summary: List recruitment listings
    description: Get organization recruitment listings
    operationId: listRecruitmentListings
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        schema:
          type: string
          enum: [open, closed, paused]
      - name: page
        in: query
        schema:
          type: integer
          default: 1
    responses:
      '200':
        description: List of recruitment listings

  post:
    tags:
      - Recruitment
    summary: Create recruitment listing
    operationId: createRecruitmentListing
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, organizationId]
            properties:
              title:
                type: string
              description:
                type: string
              organizationId:
                type: string
                format: uuid
              requirements:
                type: array
                items:
                  type: string
              rolesNeeded:
                type: array
                items:
                  type: string
    responses:
      '201':
        description: Listing created

/api/v2/recruitment/listings/{listingId}:
  get:
    tags:
      - Recruitment
    summary: Get recruitment listing
    operationId: getRecruitmentListing
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Listing details

  put:
    tags:
      - Recruitment
    summary: Update recruitment listing
    operationId: updateRecruitmentListing
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Listing updated

  delete:
    tags:
      - Recruitment
    summary: Close recruitment listing
    operationId: closeRecruitmentListing
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Listing closed

/api/v2/recruitment/listings/{listingId}/applications:
  get:
    tags:
      - Recruitment
    summary: List applications for a listing
    operationId: listApplications
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: List of applications

  post:
    tags:
      - Recruitment
    summary: Apply to listing
    operationId: applyToListing
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              experience:
                type: string
    responses:
      '201':
        description: Application submitted

/api/v2/recruitment/applications/{applicationId}/status:
  put:
    tags:
      - Recruitment
    summary: Update application status
    description: Accept, reject, or put an application on hold
    operationId: updateApplicationStatus
    security:
      - bearerAuth: []
    parameters:
      - name: applicationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [status]
            properties:
              status:
                type: string
                enum: [accepted, rejected, hold]
              notes:
                type: string
    responses:
      '200':
        description: Application status updated
