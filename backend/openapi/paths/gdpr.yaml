# GDPR API Paths

/api/v2/gdpr/consent:
  post:
    tags:
      - GDPR
    summary: Grant consent
    description: Record user consent for a specific purpose (GDPR Article 7)
    operationId: grantConsent
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [purpose]
            properties:
              purpose:
                type: string
                enum: [essential, analytics, marketing, third_party]
    responses:
      '200':
        description: Consent granted

  get:
    tags:
      - GDPR
    summary: Get consent status
    description: Get all consent records for the authenticated user
    operationId: getConsentStatus
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Consent records

/api/v2/gdpr/consent/{consentType}:
  get:
    tags:
      - GDPR
    summary: Get specific consent
    operationId: getConsentByType
    security:
      - bearerAuth: []
    parameters:
      - name: consentType
        in: path
        required: true
        schema:
          type: string
          enum: [essential, analytics, marketing, third_party]
    responses:
      '200':
        description: Consent record for type

/api/v2/gdpr/export:
  get:
    tags:
      - GDPR
    summary: Export user data
    description: Export all user data (GDPR Article 15 - Right of Access, Article 20 - Portability)
    operationId: exportUserData
    security:
      - bearerAuth: []
    parameters:
      - name: format
        in: query
        schema:
          type: string
          enum: [json, csv]
          default: json
    responses:
      '200':
        description: User data export
        content:
          application/json:
            schema:
              type: object
          text/csv:
            schema:
              type: string

/api/v2/gdpr/export-request:
  post:
    tags:
      - GDPR
    summary: Request data export
    description: Submit an async data export request (rate-limited)
    operationId: createExportRequest
    security:
      - bearerAuth: []
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              format:
                type: string
                enum: [json, csv]
                default: json
    responses:
      '202':
        description: Export request accepted
      '429':
        description: Rate limit exceeded

/api/v2/gdpr/export-requests:
  get:
    tags:
      - GDPR
    summary: List export requests
    operationId: listExportRequests
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of export requests

/api/v2/gdpr/export-request/{requestId}:
  get:
    tags:
      - GDPR
    summary: Get export request status
    operationId: getExportRequest
    security:
      - bearerAuth: []
    parameters:
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Export request details

/api/v2/gdpr/export-request/{requestId}/download:
  get:
    tags:
      - GDPR
    summary: Download export file
    description: Download the completed data export (Azure Blob Storage signed URL)
    operationId: downloadExport
    security:
      - bearerAuth: []
    parameters:
      - name: requestId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Export file download
      '404':
        description: Export not found or not ready

/api/v2/gdpr/delete-account:
  delete:
    tags:
      - GDPR
    summary: Request account deletion
    description: Initiate account deletion process (GDPR Article 17 - Right to Erasure). 7-day confirmation window.
    operationId: requestAccountDeletion
    security:
      - bearerAuth: []
    responses:
      '202':
        description: Deletion request created, confirmation email sent

/api/v2/gdpr/deletion-status:
  get:
    tags:
      - GDPR
    summary: Get deletion request status
    operationId: getDeletionStatus
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Deletion request status

/api/v2/gdpr/verify-deletion-email:
  post:
    tags:
      - GDPR
    summary: Confirm deletion via email token
    operationId: verifyDeletionEmail
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [token]
            properties:
              token:
                type: string
    responses:
      '200':
        description: Deletion confirmed

/api/v2/gdpr/resend-deletion-confirmation:
  post:
    tags:
      - GDPR
    summary: Resend deletion confirmation email
    operationId: resendDeletionConfirmation
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Confirmation email resent

/api/v2/gdpr/statistics:
  get:
    tags:
      - GDPR
      - Admin
    summary: GDPR statistics (admin)
    description: Get platform-wide GDPR compliance statistics
    operationId: getGdprStatistics
    security:
      - bearerAuth: []
    responses:
      '200':
        description: GDPR compliance statistics
      '403':
        description: Admin access required

/api/v2/gdpr/dashboard:
  get:
    tags:
      - GDPR
      - Admin
    summary: GDPR dashboard (admin)
    description: Get GDPR compliance dashboard data
    operationId: getGdprDashboard
    security:
      - bearerAuth: []
    responses:
      '200':
        description: GDPR dashboard data
      '403':
        description: Admin access required
