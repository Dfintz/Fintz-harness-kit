# Health API Paths

health:
  get:
    tags:
      - Health
    summary: Basic health check
    description: Returns basic health status of the API
    operationId: getHealth
    security: []  # No auth required
    responses:
      '200':
        description: System is healthy
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [OK, DEGRADED, ERROR]
                timestamp:
                  type: string
                  format: date-time
                uptime:
                  type: number
                environment:
                  type: string
                database:
                  type: string
      '503':
        description: System is unhealthy
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [DEGRADED, ERROR]

healthSystem:
  get:
    tags:
      - Health
    summary: Comprehensive system health
    description: Returns detailed health status of all system components
    operationId: getSystemHealth
    security: []
    responses:
      '200':
        description: Health status retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SystemHealth'
      '503':
        description: System is degraded or unhealthy
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/SystemHealth'

healthComponent:
  get:
    tags:
      - Health
    summary: Component health check
    description: Returns health status of a specific component
    operationId: getComponentHealth
    security: []
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Component name
    responses:
      '200':
        description: Component health status
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  $ref: '../schemas/common.yaml#/HealthStatus'
                latency:
                  type: number
                lastCheck:
                  type: string
                  format: date-time
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
