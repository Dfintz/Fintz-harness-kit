# Discord Integration API Paths

/api/v2/discord/status:
  get:
    tags:
      - Discord
    summary: Get Discord bot connection status
    operationId: getDiscordStatus
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Discord integration status

/api/v2/discord/settings:
  get:
    tags:
      - Discord
    summary: Get Discord settings
    description: Get Discord integration settings for an organization
    operationId: getDiscordSettings
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Discord settings

  put:
    tags:
      - Discord
    summary: Update Discord settings
    operationId: updateDiscordSettings
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              guildId:
                type: string
              webhookUrl:
                type: string
                format: uri
              notificationChannel:
                type: string
              welcomeChannel:
                type: string
              autoSync:
                type: boolean
    responses:
      '200':
        description: Settings updated

/api/v2/discord/sync:
  post:
    tags:
      - Discord
    summary: Trigger Discord role sync
    description: Manually sync organization roles with Discord server roles
    operationId: syncDiscordRoles
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Sync initiated

/api/v2/discord/webhooks:
  get:
    tags:
      - Discord
    summary: List Discord webhooks
    operationId: listDiscordWebhooks
    security:
      - bearerAuth: []
    responses:
      '200':
        description: List of configured webhooks

  post:
    tags:
      - Discord
    summary: Create Discord webhook
    operationId: createDiscordWebhook
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [channelId, events]
            properties:
              channelId:
                type: string
              events:
                type: array
                items:
                  type: string
    responses:
      '201':
        description: Webhook created
