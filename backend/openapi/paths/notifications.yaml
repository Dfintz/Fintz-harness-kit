# Notifications API Paths

/api/v2/notifications:
  get:
    tags:
      - Notifications
    summary: List notifications
    description: Get notifications for the authenticated user
    operationId: getNotifications
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: pageSize
        in: query
        schema:
          type: integer
          default: 20
      - name: unreadOnly
        in: query
        schema:
          type: boolean
    responses:
      '200':
        description: List of notifications
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/notification.yaml#/Notification'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        description: Not authenticated

/api/v2/notifications/mark-read:
  post:
    tags:
      - Notifications
    summary: Mark notifications as read
    operationId: markNotificationsRead
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [notificationIds]
            properties:
              notificationIds:
                type: array
                items:
                  type: string
                  format: uuid
    responses:
      '200':
        description: Notifications marked as read

/api/v2/notifications/mark-all-read:
  post:
    tags:
      - Notifications
    summary: Mark all notifications as read
    operationId: markAllNotificationsRead
    security:
      - bearerAuth: []
    responses:
      '200':
        description: All notifications marked as read

/api/v2/notifications/{notificationId}:
  delete:
    tags:
      - Notifications
    summary: Delete notification
    operationId: deleteNotification
    security:
      - bearerAuth: []
    parameters:
      - name: notificationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Notification deleted

/api/v2/notifications/preferences/user:
  get:
    tags:
      - Notifications
    summary: Get notification preferences
    operationId: getNotificationPreferences
    security:
      - bearerAuth: []
    responses:
      '200':
        description: User notification preferences

  put:
    tags:
      - Notifications
    summary: Update notification preferences
    operationId: updateNotificationPreferences
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              emailEnabled:
                type: boolean
              pushEnabled:
                type: boolean
              categories:
                type: object
                additionalProperties:
                  type: boolean
    responses:
      '200':
        description: Preferences updated
