# Authentication API Paths

login:
  post:
    tags:
      - Authentication
    summary: User login
    description: Authenticate user and generate access and refresh tokens
    operationId: login
    security: []  # No auth required for login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - password
            properties:
              username:
                type: string
                minLength: 3
                maxLength: 100
              password:
                type: string
                minLength: 8
                maxLength: 100
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
                  description: JWT access token
                refreshToken:
                  type: string
                  description: JWT refresh token
                expiresIn:
                  type: integer
                  description: Token expiry time in seconds
                user:
                  $ref: '../schemas/user.yaml#/User'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'

refresh:
  post:
    tags:
      - Authentication
    summary: Refresh access token
    description: Exchange refresh token for new access token
    operationId: refreshToken
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
                description: Valid refresh token
    responses:
      '200':
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
                refreshToken:
                  type: string
                expiresIn:
                  type: integer
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

logout:
  post:
    tags:
      - Authentication
    summary: Logout
    description: Revoke a single refresh token
    operationId: logout
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      '200':
        description: Logged out successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

logoutAll:
  post:
    tags:
      - Authentication
    summary: Logout from all sessions
    description: Revoke all refresh tokens for the authenticated user
    operationId: logoutAll
    responses:
      '200':
        description: All sessions logged out successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

sessions:
  get:
    tags:
      - Authentication
    summary: Get active sessions
    description: Returns all active refresh tokens for the authenticated user
    operationId: getActiveSessions
    responses:
      '200':
        description: Active sessions retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                sessions:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      deviceInfo:
                        type: string
                      lastUsed:
                        type: string
                        format: date-time
                      createdAt:
                        type: string
                        format: date-time
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
