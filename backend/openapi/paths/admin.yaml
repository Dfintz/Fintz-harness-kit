# Admin API Paths

listUsers:
  get:
    tags:
      - Admin
    summary: List all users (admin only)
    description: Returns a paginated list of all users in the system
    operationId: listAllUsers
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: search
        in: query
        schema:
          type: string
        description: Search by username or email
      - name: role
        in: query
        schema:
          type: string
          enum: [admin, user, moderator]
    responses:
      '200':
        description: Users retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  items:
                    $ref: '../schemas/user.yaml#/UserV2'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

updateUserRole:
  patch:
    tags:
      - Admin
    summary: Update user role (admin only)
    description: Updates a user's role in the system
    operationId: updateUserRole
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - role
            properties:
              role:
                type: string
                enum: [admin, user, moderator]
    responses:
      '200':
        description: Role updated
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

deleteUser:
  delete:
    tags:
      - Admin
    summary: Delete user (admin only)
    description: Permanently deletes a user and all associated data
    operationId: deleteUser
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: User deleted
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

systemHealth:
  get:
    tags:
      - Admin
    summary: Get system health (admin only)
    description: Returns detailed system health metrics
    operationId: getSystemHealth
    responses:
      '200':
        description: System health retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, degraded, unhealthy]
                components:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      status:
                        type: string
                      latency:
                        type: number
                      lastCheck:
                        type: string
                        format: date-time
                uptime:
                  type: number
                timestamp:
                  type: string
                  format: date-time
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

auditLogs:
  get:
    tags:
      - Admin
    summary: Get audit logs (admin only)
    description: Returns system audit logs
    operationId: getAuditLogs
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      - name: userId
        in: query
        schema:
          type: string
          format: uuid
      - name: action
        in: query
        schema:
          type: string
      - name: startDate
        in: query
        schema:
          type: string
          format: date-time
      - name: endDate
        in: query
        schema:
          type: string
          format: date-time
    responses:
      '200':
        description: Audit logs retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                logs:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      action:
                        type: string
                      resource:
                        type: string
                      resourceId:
                        type: string
                      details:
                        type: object
                      ipAddress:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
