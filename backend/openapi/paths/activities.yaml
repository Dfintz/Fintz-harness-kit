# Activity API Paths

organizationActivities:
  get:
    tags:
      - Activities
    summary: List organization activities
    description: Get all activities for an organization with filtering and pagination
    operationId: listOrganizationActivities
    parameters:
      - $ref: '../parameters/_index.yaml#/OrganizationId'
      - $ref: '../parameters/_index.yaml#/Page'
      - $ref: '../parameters/_index.yaml#/Limit'
      - $ref: '../parameters/_index.yaml#/Search'
      - name: status
        in: query
        schema:
          type: string
          enum: [DRAFT, SCHEDULED, ACTIVE, COMPLETED, CANCELLED]
        description: Filter by activity status
      - name: type
        in: query
        schema:
          type: string
          enum: [MISSION, CONTRACT, BOUNTY, EVENT, LFG, OPERATION, RECRUITMENT, JOB_LISTING]
        description: Filter by activity type
    responses:
      '200':
        description: List of activities
        content:
          application/json:
            schema:
              $ref: '../schemas/activity.yaml#/ActivityListResponse'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  post:
    tags:
      - Activities
    summary: Create a new activity
    description: Create a new activity for the organization
    operationId: createActivity
    parameters:
      - $ref: '../parameters/_index.yaml#/OrganizationId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/activity.yaml#/CreateActivityRequest'
    responses:
      '201':
        description: Activity created
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                data:
                  $ref: '../schemas/activity.yaml#/ActivityV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

activity:
  get:
    tags:
      - Activities
    summary: Get activity by ID
    description: Get detailed information about a specific activity
    operationId: getActivityById
    parameters:
      - $ref: '../parameters/_index.yaml#/ActivityId'
    responses:
      '200':
        description: Activity details
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                data:
                  $ref: '../schemas/activity.yaml#/ActivityV2'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  put:
    tags:
      - Activities
    summary: Update activity
    description: Update activity details
    operationId: updateActivity
    parameters:
      - $ref: '../parameters/_index.yaml#/ActivityId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              status:
                type: string
                enum: [DRAFT, SCHEDULED, ACTIVE, COMPLETED, CANCELLED]
              scheduledStartDate:
                type: string
                format: date-time
              scheduledEndDate:
                type: string
                format: date-time
              location:
                type: string
              maxParticipants:
                type: integer
    responses:
      '200':
        description: Activity updated
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                data:
                  $ref: '../schemas/activity.yaml#/ActivityV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
  
  delete:
    tags:
      - Activities
    summary: Delete activity
    description: Delete an activity
    operationId: deleteActivity
    parameters:
      - $ref: '../parameters/_index.yaml#/ActivityId'
    responses:
      '204':
        $ref: '../responses/_index.yaml#/NoContent'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'

upcomingActivities:
  get:
    tags:
      - Activities
    summary: Get upcoming activities
    description: Get activities scheduled for the future
    operationId: getUpcomingActivities
    parameters:
      - name: orgId
        in: query
        schema:
          type: string
          format: uuid
        description: Filter by organization (optional)
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        description: Number of activities to return
    responses:
      '200':
        description: List of upcoming activities
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success]
                data:
                  type: object
                  properties:
                    activities:
                      type: array
                      items:
                        $ref: '../schemas/activity.yaml#/ActivityV2'
                    count:
                      type: integer
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
