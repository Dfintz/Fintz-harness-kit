# Trading API Paths

listTradingRoutes:
  get:
    tags:
      - Trading
    summary: List trading routes
    description: Returns trading routes for the organization
    operationId: listTradingRoutes
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum: [active, inactive, archived]
      - name: profitMin
        in: query
        schema:
          type: number
          minimum: 0
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Trading routes retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                routes:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      origin:
                        type: string
                      destination:
                        type: string
                      commodity:
                        type: string
                      buyPrice:
                        type: number
                      sellPrice:
                        type: number
                      profit:
                        type: number
                      distance:
                        type: number
                      status:
                        type: string
                        enum: [active, inactive, archived]
                      lastUpdated:
                        type: string
                        format: date-time
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

createTradingRoute:
  post:
    tags:
      - Trading
    summary: Create trading route
    description: Creates a new trading route
    operationId: createTradingRoute
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - origin
              - destination
              - commodity
            properties:
              name:
                type: string
                minLength: 3
                maxLength: 200
              origin:
                type: string
              destination:
                type: string
              commodity:
                type: string
              buyPrice:
                type: number
                minimum: 0
              sellPrice:
                type: number
                minimum: 0
              distance:
                type: number
                minimum: 0
              notes:
                type: string
                maxLength: 1000
    responses:
      '201':
        description: Trading route created
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                origin:
                  type: string
                destination:
                  type: string
                profit:
                  type: number
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

tradingRouteById:
  get:
    tags:
      - Trading
    summary: Get trading route by ID
    description: Returns trading route details
    operationId: getTradingRouteById
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: routeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Trading route retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                origin:
                  type: string
                destination:
                  type: string
                commodity:
                  type: string
                buyPrice:
                  type: number
                sellPrice:
                  type: number
                profit:
                  type: number
                distance:
                  type: number
                status:
                  type: string
                notes:
                  type: string
                createdAt:
                  type: string
                  format: date-time
                updatedAt:
                  type: string
                  format: date-time
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
  
  patch:
    tags:
      - Trading
    summary: Update trading route
    description: Updates trading route details
    operationId: updateTradingRoute
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: routeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
              buyPrice:
                type: number
              sellPrice:
                type: number
              status:
                type: string
                enum: [active, inactive, archived]
              notes:
                type: string
    responses:
      '200':
        description: Trading route updated
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
  
  delete:
    tags:
      - Trading
    summary: Delete trading route
    description: Deletes a trading route
    operationId: deleteTradingRoute
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: routeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Trading route deleted
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

cargoManifests:
  get:
    tags:
      - Trading
    summary: List cargo manifests
    description: Returns cargo manifests for the organization
    operationId: listCargoManifests
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
          enum: [loading, in_transit, delivered, cancelled]
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Cargo manifests retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                manifests:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      shipId:
                        type: string
                        format: uuid
                      cargo:
                        type: array
                        items:
                          type: object
                          properties:
                            commodity:
                              type: string
                            quantity:
                              type: number
                            value:
                              type: number
                      status:
                        type: string
                      origin:
                        type: string
                      destination:
                        type: string
                      departureTime:
                        type: string
                        format: date-time
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
