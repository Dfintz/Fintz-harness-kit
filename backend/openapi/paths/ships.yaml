# Ship API Paths

listShips:
  get:
    tags:
      - Ships
    summary: List ships
    description: Returns ships for the organization with optional filters
    operationId: listShips
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: manufacturer
        in: query
        schema:
          type: string
      - name: size
        in: query
        schema:
          type: string
          enum: [small, medium, large, capital]
      - name: role
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum: [active, maintenance, destroyed, loaned]
      - name: isVehicle
        in: query
        schema:
          type: boolean
      - name: isActive
        in: query
        schema:
          type: boolean
      - name: search
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    responses:
      '200':
        description: Ships retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                ships:
                  type: array
                  items:
                    $ref: '../schemas/ship.yaml#/ShipV2'
                pagination:
                  $ref: '../schemas/common.yaml#/Pagination'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

createShip:
  post:
    tags:
      - Ships
    summary: Create ship
    description: Add a new ship to the organization
    operationId: createShip
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - model
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 100
              model:
                type: string
              manufacturer:
                type: string
              size:
                type: string
                enum: [small, medium, large, capital]
              role:
                type: string
              crew:
                type: integer
                minimum: 0
              cargo:
                type: integer
                minimum: 0
              status:
                type: string
                enum: [active, maintenance, destroyed, loaned]
                default: active
              isVehicle:
                type: boolean
                default: false
              ownerId:
                type: string
                format: uuid
    responses:
      '201':
        description: Ship created
        content:
          application/json:
            schema:
              $ref: '../schemas/ship.yaml#/ShipV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

shipById:
  get:
    tags:
      - Ships
    summary: Get ship by ID
    description: Returns ship details
    operationId: getShipById
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Ship retrieved
        content:
          application/json:
            schema:
              $ref: '../schemas/ship.yaml#/ShipV2'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
  
  patch:
    tags:
      - Ships
    summary: Update ship
    description: Update ship details
    operationId: updateShip
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 100
              status:
                type: string
                enum: [active, maintenance, destroyed, loaned]
              crew:
                type: integer
                minimum: 0
              cargo:
                type: integer
                minimum: 0
              isActive:
                type: boolean
    responses:
      '200':
        description: Ship updated
        content:
          application/json:
            schema:
              $ref: '../schemas/ship.yaml#/ShipV2'
      '400':
        $ref: '../responses/_index.yaml#/BadRequest'
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'
  
  delete:
    tags:
      - Ships
    summary: Delete ship
    description: Delete a ship from the organization
    operationId: deleteShip
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: Ship deleted
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
      '403':
        $ref: '../responses/_index.yaml#/Forbidden'

shipLoadouts:
  get:
    tags:
      - Ships
    summary: List ship loadouts
    description: Returns loadout configurations for a ship
    operationId: listShipLoadouts
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Loadouts retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                loadouts:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      configuration:
                        type: object
                      isActive:
                        type: boolean
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'

shipMaintenance:
  get:
    tags:
      - Ships
    summary: List ship maintenance records
    description: Returns maintenance history for a ship
    operationId: listShipMaintenance
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: shipId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Maintenance records retrieved
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                      description:
                        type: string
                      cost:
                        type: number
                      completedAt:
                        type: string
                        format: date-time
      '404':
        $ref: '../responses/_index.yaml#/NotFound'
      '401':
        $ref: '../responses/_index.yaml#/Unauthorized'
