components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained via OAuth2 authentication
  schemas:
    Fleet: *ref_9
    FleetV2:
      type: object
      description: Fleet entity with full details (v2)
      properties:
        id:
          type: string
          format: uuid
          description: Unique fleet identifier
        name:
          type: string
          minLength: 3
          maxLength: 100
          description: Fleet name
          example: Alpha Squadron
        description:
          type: string
          maxLength: 500
          description: Fleet description
        organizationId:
          type: string
          format: uuid
          description: Parent organization ID
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        memberCount:
          type: integer
          minimum: 0
          description: Number of members in the fleet
        shipCount:
          type: integer
          minimum: 0
          description: Total number of ships in the fleet
        totalCrewCapacity:
          type: integer
          minimum: 0
          description: Combined crew capacity of all ships
        totalCargoCapacity:
          type: integer
          minimum: 0
          description: Combined cargo capacity in SCU
        isActive:
          type: boolean
          description: Whether the fleet is currently active
      required:
        - id
        - name
        - organizationId
        - createdAt
        - updatedAt
    FleetStatistics:
      type: object
      description: Aggregated fleet statistics for an organization
      properties:
        totalFleets:
          type: integer
          minimum: 0
          description: Total number of fleets
        totalMembers:
          type: integer
          minimum: 0
          description: Total unique members across all fleets
        totalShips:
          type: integer
          minimum: 0
          description: Total ships across all fleets
        totalValue:
          type: number
          minimum: 0
          description: Estimated total value in aUEC
        shipsByRole:
          type: object
          additionalProperties:
            type: integer
          description: Ship count grouped by role
          example:
            Combat: 15
            Transport: 8
            Mining: 5
        fleetsBySize:
          type: object
          additionalProperties:
            type: integer
          description: Fleet count grouped by size category
          example:
            small: 3
            medium: 5
            large: 2
      required:
        - totalFleets
        - totalMembers
        - totalShips
    FleetComposition:
      type: object
      description: Detailed fleet composition analysis
      properties:
        fleetId:
          type: string
          format: uuid
        totalShips:
          type: integer
          minimum: 0
        totalCrew:
          type: integer
          minimum: 0
        totalCargo:
          type: integer
          minimum: 0
          description: Total cargo capacity in SCU
        byManufacturer:
          type: array
          items:
            type: object
            properties:
              manufacturer:
                type: string
              count:
                type: integer
              percentage:
                type: number
        byRole:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              count:
                type: integer
              percentage:
                type: number
        bySize:
          type: array
          items:
            type: object
            properties:
              size:
                type: string
                enum:
                  - small
                  - medium
                  - large
                  - capital
              count:
                type: integer
              percentage:
                type: number
      required:
        - fleetId
        - totalShips
    Organization: *ref_14
    OrganizationV2:
      type: object
      description: Organization entity with full details (v2)
      properties:
        id:
          type: string
          format: uuid
          description: Unique organization identifier
        name:
          type: string
          minLength: 3
          maxLength: 100
          description: Organization name
          example: United Earth Empire
        description:
          type: string
          maxLength: 1000
          description: Organization description
        spectrumId:
          type: string
          description: RSI Spectrum ID for the organization
        logo:
          type: string
          format: uri
          description: URL to organization logo
        banner:
          type: string
          format: uri
          description: URL to organization banner
        memberCount:
          type: integer
          minimum: 0
          description: Total member count
        fleetCount:
          type: integer
          minimum: 0
          description: Number of fleets
        shipCount:
          type: integer
          minimum: 0
          description: Total ships owned by members
        isVerified:
          type: boolean
          description: Whether the organization is RSI verified
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        settings:
          type: object
          description: Organization-specific settings
          properties:
            isPublic:
              type: boolean
              description: Whether the organization is publicly visible
            requireApproval:
              type: boolean
              description: Whether new members require approval
            defaultRole:
              type: string
              description: Default role for new members
      required:
        - id
        - name
        - createdAt
        - updatedAt
    OrganizationMember: *ref_8
    OrganizationStatistics:
      type: object
      description: Organization statistics and metrics
      properties:
        memberCount:
          type: integer
          minimum: 0
        activeMembers:
          type: integer
          minimum: 0
          description: Members active in last 30 days
        fleetCount:
          type: integer
          minimum: 0
        totalShips:
          type: integer
          minimum: 0
        totalShipValue:
          type: number
          minimum: 0
          description: Estimated total ship value in aUEC
        activityCount:
          type: integer
          minimum: 0
          description: Activities in the last 30 days
        memberGrowth:
          type: number
          description: Member growth percentage (30 day)
        topRoles:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              count:
                type: integer
        membershipByMonth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              count:
                type: integer
      required:
        - memberCount
        - fleetCount
        - totalShips
    Activity: *ref_11
    ActivityV2:
      type: object
      description: Activity entity with full details (v2)
      properties:
        id:
          type: string
          format: uuid
          description: Unique activity identifier
        title:
          type: string
          minLength: 3
          maxLength: 200
          description: Activity title
          example: Mining Operation Alpha
        description:
          type: string
          maxLength: 2000
          description: Detailed activity description
        type:
          type: string
          enum:
            - MISSION
            - CONTRACT
            - BOUNTY
            - EVENT
            - LFG
            - OPERATION
            - RECRUITMENT
            - JOB_LISTING
          description: Activity type
        status:
          type: string
          enum:
            - DRAFT
            - SCHEDULED
            - ACTIVE
            - COMPLETED
            - CANCELLED
          description: Current activity status
        organizationId:
          type: string
          format: uuid
          description: Parent organization ID
        creatorId:
          type: string
          format: uuid
          description: User who created the activity
        scheduledStartDate:
          type: string
          format: date-time
          description: Planned start time
        scheduledEndDate:
          type: string
          format: date-time
          description: Planned end time
        actualStartDate:
          type: string
          format: date-time
          description: Actual start time
        actualEndDate:
          type: string
          format: date-time
          description: Actual end time
        location:
          type: string
          maxLength: 200
          description: In-game location
          example: Stanton / Hurston / Lorville
        maxParticipants:
          type: integer
          minimum: 1
          maximum: 1000
          description: Maximum number of participants
        participantCount:
          type: integer
          minimum: 0
          description: Current participant count
        requirements:
          type: object
          description: Participation requirements
          properties:
            minRank:
              type: string
            requiredShipTypes:
              type: array
              items:
                type: string
            requiredRoles:
              type: array
              items:
                type: string
        rewards:
          type: object
          description: Activity rewards
          properties:
            aUEC:
              type: number
              minimum: 0
            reputation:
              type: number
            items:
              type: array
              items:
                type: string
        tags:
          type: array
          items:
            type: string
          description: Activity tags for filtering
        isPublic:
          type: boolean
          description: Whether the activity is publicly visible
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - type
        - status
        - organizationId
        - creatorId
        - createdAt
        - updatedAt
    ActivityParticipant:
      type: object
      description: Activity participant information
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatar:
          type: string
          format: uri
        role:
          type: string
          description: Role in the activity (leader, pilot, gunner, etc.)
        status:
          type: string
          enum:
            - INVITED
            - CONFIRMED
            - DECLINED
            - TENTATIVE
            - ATTENDED
            - NO_SHOW
          description: Participation status
        shipType:
          type: string
          description: Ship they plan to bring
        joinedAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
      required:
        - userId
        - username
        - role
        - status
        - joinedAt
    Ship: *ref_10
    ShipV2:
      type: object
      description: Ship entity with full details (v2)
      properties:
        id:
          type: string
          format: uuid
          description: Unique ship identifier
        name:
          type: string
          maxLength: 100
          description: Custom ship name
          example: Stardust Runner
        manufacturer:
          type: string
          description: Ship manufacturer
          example: Roberts Space Industries
        model:
          type: string
          description: Ship model name
          example: Constellation Andromeda
        role:
          type: string
          enum:
            - Combat
            - Transport
            - Mining
            - Exploration
            - Industrial
            - Support
            - Racing
            - Multi-role
          description: Primary ship role
        size:
          type: string
          enum:
            - small
            - medium
            - large
            - capital
          description: Ship size category
        crewMin:
          type: integer
          minimum: 1
          description: Minimum crew requirement
        crewMax:
          type: integer
          minimum: 1
          description: Maximum crew capacity
        cargoCapacity:
          type: integer
          minimum: 0
          description: Cargo capacity in SCU
        ownerId:
          type: string
          format: uuid
          description: Owner user ID
        organizationId:
          type: string
          format: uuid
          description: Organization ID (if org-owned)
        fleetId:
          type: string
          format: uuid
          description: Assigned fleet ID
        status:
          type: string
          enum:
            - ACTIVE
            - MAINTENANCE
            - DESTROYED
            - LOANED
            - STORED
          description: Current ship status
        location:
          type: string
          description: Current in-game location
        insurance:
          type: object
          description: Insurance information
          properties:
            type:
              type: string
              enum:
                - LTI
                - 10Y
                - 6M
                - 3M
                - NONE
            expiresAt:
              type: string
              format: date-time
        loadout:
          type: object
          description: Ship loadout configuration
          properties:
            weapons:
              type: array
              items:
                type: string
            shields:
              type: array
              items:
                type: string
            components:
              type: array
              items:
                type: string
        purchaseDate:
          type: string
          format: date-time
          description: When the ship was acquired
        value:
          type: number
          minimum: 0
          description: Estimated value in aUEC
        imageUrl:
          type: string
          format: uri
          description: Ship image URL
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - manufacturer
        - model
        - ownerId
        - createdAt
        - updatedAt
    User: *ref_5
    UserV2:
      type: object
      description: User entity with full details (v2)
      properties:
        id:
          type: string
          format: uuid
          description: Unique user identifier
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Unique username
        displayName:
          type: string
          maxLength: 100
          description: Display name
        email:
          type: string
          format: email
          description: Email address
        avatar:
          type: string
          format: uri
          description: Avatar URL
        discordId:
          type: string
          description: Discord user ID
        rsiHandle:
          type: string
          description: RSI (Roberts Space Industries) handle
        rsiVerified:
          type: boolean
          description: Whether RSI handle is verified
        timezone:
          type: string
          description: User's timezone
          example: America/New_York
        language:
          type: string
          description: Preferred language
          example: en
        bio:
          type: string
          maxLength: 500
          description: User biography
        location:
          type: string
          description: User's location
        playStyle:
          type: array
          items:
            type: string
            enum:
              - PVP
              - PVE
              - TRADING
              - MINING
              - EXPLORATION
              - BOUNTY_HUNTING
              - PIRACY
              - RACING
              - ROLEPLAY
          description: Preferred play styles
        availability:
          type: object
          description: Weekly availability
          properties:
            timezone:
              type: string
            schedule:
              type: object
              additionalProperties:
                type: array
                items:
                  type: object
                  properties:
                    start:
                      type: string
                      pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
                    end:
                      type: string
                      pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
        shipCount:
          type: integer
          minimum: 0
          description: Number of ships owned
        organizationCount:
          type: integer
          minimum: 0
          description: Number of organizations
        activeOrgId:
          type: string
          format: uuid
          description: Currently active organization
        twoFactorEnabled:
          type: boolean
          description: Whether 2FA is enabled
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - createdAt
        - updatedAt
    Pagination: &ref_15
      type: object
      description: Pagination metadata for list responses
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page
          example: 20
        total:
          type: integer
          minimum: 0
          description: Total number of items
          example: 150
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
          example: 8
      required:
        - page
        - limit
        - total
        - totalPages
    PaginatedResponse:
      type: object
      description: Generic paginated response wrapper
      properties:
        data:
          type: array
          items: {}
          description: Array of items
        pagination: *ref_15
      required:
        - data
        - pagination
    ApiError: *ref_2
    ApiResponse: &ref_16
      type: object
      description: Standard API success response wrapper
      properties:
        status:
          type: string
          enum:
            - success
          description: Response status
        data:
          description: Response data
        meta:
          type: object
          description: Additional metadata
      required:
        - status
        - data
    HealthStatus: *ref_0
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization unique identifier
    FleetId:
      name: fleetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Fleet unique identifier
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Activity unique identifier
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User unique identifier
    ShipId:
      name: shipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Ship unique identifier
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 100
      description: Search query string
    SortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
      description: Field to sort by
    SortOrder:
      name: sortOrder
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
      description: Sort order (ascending or descending)
  responses:
    Success:
      description: Successful operation
      content:
        application/json:
          schema: *ref_16
    Created:
      description: Resource created successfully
      content:
        application/json:
          schema: *ref_16
    NoContent: *ref_4
    BadRequest: *ref_7
    Unauthorized: *ref_3
    Forbidden: *ref_13
    NotFound: *ref_6
    Conflict:
      description: Resource conflict (e.g., duplicate)
      content:
        application/json:
          schema: *ref_2
          example:
            status: error
            code: CONFLICT
            message: A resource with this identifier already exists
            timestamp: '2024-01-15T10:30:00Z'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema: *ref_2
          example:
            status: error
            code: INTERNAL_ERROR
            message: An unexpected error occurred
            timestamp: '2024-01-15T10:30:00Z'
    ServiceUnavailable: *ref_17
security:
  - bearerAuth: []
