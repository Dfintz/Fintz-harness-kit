openapi: 3.1.0
info:
  title: Star Citizen Fleet Manager API
  version: 2.0.0
  description: |
    Enterprise-grade fleet management platform for Star Citizen organizations.

    ## Features
    - Multi-tenant organization management
    - Fleet composition and analytics
    - Activity planning and coordination
    - Real-time WebSocket updates
    - Intel vault for sensitive data

    ## Authentication
    All protected endpoints require a Bearer token obtained via OAuth2 (Discord, Azure AD, or RSI).
  contact:
    name: API Support
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.example.com
    description: Production server
tags:
  - name: Health
    description: System health and monitoring endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Users
    description: User profile management
  - name: Fleets
    description: Fleet management operations
  - name: Organizations
    description: Organization management operations
  - name: Activities
    description: Activity planning and coordination
  - name: Ships
    description: Ship management and tracking
  - name: Admin
    description: Administrative operations (admin only)
  - name: Trading
    description: Trading routes and cargo management
  - name: Intel Vault
    description: |
      Secure intelligence storage system with role-based access control.

      ## Access Levels
      - **Owner**: Full access to all features
      - **Intel Officers**: Access based on rank and assigned permissions
      - **Regular Members**: No access

      ## Classification Levels
      - PUBLIC: Accessible to all Intel officers
      - RESTRICTED: Accessible to all Intel officers  
      - CONFIDENTIAL: Officer rank or above
      - SECRET: Senior rank or above
      - TOP_SECRET: Chief officer and org owner only

      ## Audit Logging
      All Intel vault activities are logged for compliance.
      Logs are retained for 30 days (configurable).
paths:
  /health:
    get:
      tags:
        - Health
      summary: Basic health check
      description: Returns basic health status of the API
      operationId: getHealth
      security: []
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - OK
                      - DEGRADED
                      - ERROR
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  environment:
                    type: string
                  database:
                    type: string
        '503': &ref_17
          description: Service temporarily unavailable
          content:
            application/json:
              schema: &ref_2
                type: object
                description: Standard API error response
                properties:
                  status:
                    type: string
                    enum:
                      - error
                    description: Response status
                  code:
                    type: string
                    description: Machine-readable error code
                    example: VALIDATION_ERROR
                  message:
                    type: string
                    description: Human-readable error message
                    example: Invalid request parameters
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          description: Field that caused the error
                        message:
                          type: string
                          description: Error message for the field
                    description: Detailed validation errors
                  timestamp:
                    type: string
                    format: date-time
                    description: Error timestamp
                required:
                  - status
                  - code
                  - message
                  - timestamp
              example:
                status: error
                code: SERVICE_UNAVAILABLE
                message: The service is temporarily unavailable
                timestamp: '2024-01-15T10:30:00Z'
  /health/system:
    get:
      tags:
        - Health
      summary: Comprehensive system health
      description: Returns detailed health status of all system components
      operationId: getSystemHealth
      security: []
      responses:
        '200':
          description: Health status retrieved
          content:
            application/json:
              schema: &ref_1
                type: object
                description: System health check response
                properties:
                  status: &ref_0
                    type: string
                    enum:
                      - healthy
                      - degraded
                      - unhealthy
                    description: System health status indicator
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                    description: System uptime in seconds
                  environment:
                    type: string
                    description: Current environment (development/production)
                  database:
                    type: string
                    description: Database connection status
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status: *ref_0
                        latency:
                          type: number
                          description: Service latency in milliseconds
                required:
                  - status
                  - timestamp
        '503':
          description: System is degraded or unhealthy
          content:
            application/json:
              schema: *ref_1
  /health/component/{name}:
    get:
      tags:
        - Health
      summary: Component health check
      description: Returns health status of a specific component
      operationId: getComponentHealth
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Component name
      responses:
        '200':
          description: Component health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    type: string
                  status:
                    type: string
                    enum:
                      - OK
                      - DEGRADED
                      - ERROR
                  message:
                    type: string
        '404': &ref_6
          description: Resource not found
          content:
            application/json:
              schema: *ref_2
              example:
                status: error
                code: NOT_FOUND
                message: The requested resource was not found
                timestamp: '2024-01-15T10:30:00Z'
  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user: &ref_5
                    type: object
                    description: Basic user entity (v1 compatibility)
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Unique user identifier
                      username:
                        type: string
                        description: Username
                      email:
                        type: string
                        format: email
                        description: User email
                      discordId:
                        type: string
                        description: Discord user ID
                    required:
                      - id
                      - username
                      - email
                      - discordId
        '401': &ref_3
          description: Authentication required
          content:
            application/json:
              schema: *ref_2
              example:
                status: error
                code: UNAUTHORIZED
                message: Authentication required
                timestamp: '2024-01-15T10:30:00Z'
  /api/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get a new access token using refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        '401': *ref_3
  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout current session
      description: Invalidate current access token
      operationId: logout
      responses:
        '204': &ref_4
          description: Operation successful, no content returned
  /api/auth/logout-all:
    post:
      tags:
        - Authentication
      summary: Logout all sessions
      description: Invalidate all user sessions
      operationId: logoutAll
      responses:
        '204': *ref_4
  /api/auth/sessions:
    get:
      tags:
        - Authentication
      summary: List active sessions
      description: Get all active sessions for current user
      operationId: listSessions
      responses:
        '200':
          description: Sessions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    lastActivity:
                      type: string
                      format: date-time
                    ipAddress:
                      type: string
                    userAgent:
                      type: string
  /api/users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      operationId: getMyProfile
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema: *ref_5
  /api/users/me/profile:
    put:
      tags:
        - Users
      summary: Update current user profile
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Request body for updating user profile
              properties:
                displayName:
                  type: string
                  maxLength: 100
                bio:
                  type: string
                  maxLength: 500
                timezone:
                  type: string
                language:
                  type: string
                location:
                  type: string
                playStyle:
                  type: array
                  items:
                    type: string
                availability:
                  type: object
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: *ref_5
        '400': &ref_7
          description: Invalid request parameters
          content:
            application/json:
              schema: *ref_2
              example:
                status: error
                code: VALIDATION_ERROR
                message: Invalid request parameters
                details:
                  - field: name
                    message: Name must be at least 3 characters
                timestamp: '2024-01-15T10:30:00Z'
  /api/users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User retrieved
          content:
            application/json:
              schema: *ref_5
        '404': *ref_6
  /api/users/search:
    get:
      tags:
        - Users
      summary: Search users
      operationId: searchUsers
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items: *ref_5
  /api/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/auth/reset-password/{token}:
    get:
      tags:
        - Authentication
      summary: Verify reset token
      operationId: verifyResetToken
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
        '400': *ref_7
  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Password reset successful
        '400': *ref_7
  /api/organizations/{organizationId}:
    get:
      tags:
        - Organizations
      summary: Get organization by ID
      operationId: getOrganizationById
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization retrieved
          content:
            application/json:
              schema: &ref_14
                type: object
                description: Basic organization entity (v1 compatibility)
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique organization identifier
                  name:
                    type: string
                    description: Organization name
                  members:
                    type: array
                    items:
                      type: string
                    description: Organization member user IDs
                required:
                  - id
                  - name
                  - members
        '404': *ref_6
  /api/organizations/{organizationId}/members:
    get:
      tags:
        - Organizations
      summary: List organization members
      operationId: getOrganizationMembers
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Members retrieved
          content:
            application/json:
              schema:
                type: array
                items: &ref_8
                  type: object
                  description: Organization member with role information
                  properties:
                    userId:
                      type: string
                      format: uuid
                    username:
                      type: string
                    displayName:
                      type: string
                    avatar:
                      type: string
                      format: uri
                    role:
                      type: string
                      description: Member's role in the organization
                      example: officer
                    permissions:
                      type: array
                      items:
                        type: string
                      description: Granted permissions
                    joinedAt:
                      type: string
                      format: date-time
                    lastActiveAt:
                      type: string
                      format: date-time
                    shipCount:
                      type: integer
                      minimum: 0
                  required:
                    - userId
                    - username
                    - role
                    - joinedAt
  /api/organizations/{organizationId}/members/{memberId}:
    get:
      tags:
        - Organizations
      summary: Get member details
      operationId: getOrganizationMember
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member retrieved
          content:
            application/json:
              schema: *ref_8
        '404': *ref_6
  /api/organizations/{organizationId}/statistics:
    get:
      tags:
        - Organizations
      summary: Get organization statistics
      operationId: getOrganizationStatistics
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalMembers:
                    type: integer
                  totalShips:
                    type: integer
                  totalFleets:
                    type: integer
                  totalActivities:
                    type: integer
  /api/organizations/{organizationId}/ships/{shipId}:
    get:
      tags:
        - Ships
      summary: Get ship by ID
      operationId: getShipById
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: shipId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ship retrieved
          content:
            application/json:
              schema: &ref_10
                type: object
                description: Basic ship entity
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  manufacturer:
                    type: string
                  model:
                    type: string
                required:
                  - id
                  - name
        '404': *ref_6
  /api/organizations/{organizationId}/ships/{shipId}/loadouts:
    get:
      tags:
        - Ships
      summary: Get ship loadouts
      operationId: getShipLoadouts
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: shipId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Loadouts retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/organizations/{organizationId}/ships/{shipId}/maintenance:
    get:
      tags:
        - Ships
      summary: Get ship maintenance records
      operationId: getShipMaintenance
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: shipId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Maintenance records retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /api/v2/organizations/{organizationId}/fleets:
    get:
      tags:
        - Fleets
      summary: List organization fleets
      operationId: getOrganizationFleets
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleets retrieved
          content:
            application/json:
              schema:
                type: array
                items: &ref_9
                  type: object
                  description: Basic fleet entity (v1 compatibility)
                  properties:
                    id:
                      type: string
                      format: uuid
                      description: Unique fleet identifier
                    name:
                      type: string
                      minLength: 3
                      maxLength: 100
                      description: Fleet name
                    members:
                      type: array
                      items:
                        type: string
                      description: Fleet member user IDs
                  required:
                    - id
                    - name
                    - members
  /api/v2/fleets/{fleetId}:
    get:
      tags:
        - Fleets
      summary: Get fleet by ID
      operationId: getFleetById
      parameters:
        - name: fleetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet retrieved
          content:
            application/json:
              schema: *ref_9
        '404': *ref_6
  /api/v2/fleets/{fleetId}/ships:
    get:
      tags:
        - Fleets
      summary: List fleet ships
      operationId: getFleetShips
      parameters:
        - name: fleetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet ships retrieved
          content:
            application/json:
              schema:
                type: array
                items: *ref_10
  /api/v2/fleets/{fleetId}/composition:
    get:
      tags:
        - Fleets
      summary: Get fleet composition analysis
      operationId: getFleetComposition
      parameters:
        - name: fleetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fleet composition retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalShips:
                    type: integer
                  byRole:
                    type: object
                  bySize:
                    type: object
                  byManufacturer:
                    type: object
  /api/v2/organizations/{organizationId}/activities:
    get:
      tags:
        - Activities
      summary: List organization activities
      operationId: getOrganizationActivities
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activities retrieved
          content:
            application/json:
              schema:
                type: array
                items: &ref_11
                  type: object
                  description: Basic activity entity (v1)
                  properties:
                    id:
                      type: string
                      format: uuid
                    title:
                      type: string
                    type:
                      type: string
                    status:
                      type: string
                  required:
                    - id
                    - title
                    - type
                    - status
  /api/v2/activities/{activityId}:
    get:
      tags:
        - Activities
      summary: Get activity by ID
      operationId: getActivityById
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Activity retrieved
          content:
            application/json:
              schema: *ref_11
        '404': *ref_6
  /api/v2/activities/upcoming:
    get:
      tags:
        - Activities
      summary: Get upcoming activities
      operationId: getUpcomingActivities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Upcoming activities retrieved
          content:
            application/json:
              schema:
                type: array
                items: *ref_11
  /api/organizations/{orgId}/intel/access:
    get:
      tags:
        - Intel Vault
      summary: Check intel access
      operationId: checkIntelAccess
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access information retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasAccess:
                    type: boolean
                  role:
                    type: string
                  permissions:
                    type: array
                    items:
                      type: string
  /api/organizations/{orgId}/intel/entries:
    get:
      tags:
        - Intel Vault
      summary: List intel entries
      operationId: listIntelEntries
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Intel entries retrieved
          content:
            application/json:
              schema:
                type: array
                items: &ref_12
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    organizationId:
                      type: string
                      format: uuid
                    title:
                      type: string
                      minLength: 3
                      maxLength: 200
                    content:
                      type: string
                      minLength: 1
                      maxLength: 50000
                    classification:
                      type: string
                      enum:
                        - public
                        - restricted
                        - confidential
                        - secret
                        - top_secret
                      description: |
                        Classification level for Intel entries:
                        - public: Accessible to all Intel officers
                        - restricted: Accessible to all Intel officers
                        - confidential: Requires Officer rank or above
                        - secret: Requires Senior rank or above
                        - top_secret: Only Chief officer and org owner
                    category:
                      type: string
                      enum:
                        - strategic
                        - tactical
                        - personnel
                        - enemy
                        - alliance
                        - economic
                        - technical
                        - other
                      description: Category of the Intel entry
                    tags:
                      type: array
                      items:
                        type: string
                      maxItems: 20
                    location:
                      type: string
                      maxLength: 200
                    eventDate:
                      type: string
                      format: date-time
                    isArchived:
                      type: boolean
                      default: false
                    createdBy:
                      type: string
                      format: uuid
                    updatedBy:
                      type: string
                      format: uuid
                    metadata:
                      type: object
                      properties:
                        attachments:
                          type: array
                          items:
                            type: string
                          maxItems: 10
                        relatedEntries:
                          type: array
                          items:
                            type: string
                          maxItems: 20
                        sources:
                          type: array
                          items:
                            type: string
                          maxItems: 10
                        reliability:
                          type: integer
                          minimum: 1
                          maximum: 5
                        urgency:
                          type: string
                          enum:
                            - low
                            - medium
                            - high
                            - critical
                        expirationDate:
                          type: string
                          format: date-time
                        customFields:
                          type: object
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
                  required:
                    - id
                    - organizationId
                    - title
                    - content
                    - classification
                    - category
                    - createdBy
                    - createdAt
  /api/organizations/{orgId}/intel/entries/{entryId}:
    get:
      tags:
        - Intel Vault
      summary: Get intel entry by ID
      operationId: getIntelEntry
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Intel entry retrieved
          content:
            application/json:
              schema: *ref_12
        '403': &ref_13
          description: Insufficient permissions
          content:
            application/json:
              schema: *ref_2
              example:
                status: error
                code: FORBIDDEN
                message: You do not have permission to perform this action
                timestamp: '2024-01-15T10:30:00Z'
        '404': *ref_6
  /api/organizations/{orgId}/intel/officers:
    get:
      tags:
        - Intel Vault
      summary: List intel officers
      operationId: listIntelOfficers
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Officers retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
