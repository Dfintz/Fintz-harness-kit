# Star Citizen Fleet Manager API - OpenAPI 3.1 Specification
#
# This is the main entry point for the API specification.
# It references component schemas for modularity and reusability.

openapi: 3.1.0

info:
  title: Star Citizen Fleet Manager API
  version: 2.0.0
  description: |
    Enterprise-grade fleet management platform for Star Citizen organizations.

    ## Features
    - Multi-tenant organization management
    - Fleet composition and analytics
    - Activity planning and coordination
    - Real-time WebSocket updates
    - Intel vault for sensitive data

    ## Authentication
    All protected endpoints require a Bearer token obtained via OAuth2 (Discord, Azure AD, or RSI).
  contact:
    name: API Support
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Health
    description: System health and monitoring endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Users
    description: User profile management
  - name: Fleets
    description: Fleet management operations
  - name: Organizations
    description: Organization management operations
  - name: Activities
    description: Activity planning and coordination
  - name: Ships
    description: Ship management and tracking
  - name: Admin
    description: Administrative operations (admin only)
  - name: Trading
    description: Trading routes and cargo management
  - name: Intel Vault
    description: |
      Secure intelligence storage system with role-based access control.

      ## Access Levels
      - **Owner**: Full access to all features
      - **Intel Officers**: Access based on rank and assigned permissions
      - **Regular Members**: No access

      ## Classification Levels
      - PUBLIC: Accessible to all Intel officers
      - RESTRICTED: Accessible to all Intel officers  
      - CONFIDENTIAL: Officer rank or above
      - SECRET: Senior rank or above
      - TOP_SECRET: Chief officer and org owner only

      ## Audit Logging
      All Intel vault activities are logged for compliance.
      Logs are retained for 30 days (configurable).
  - name: Events
    description: Event planning and calendar management
  - name: Notifications
    description: User notification management and preferences
  - name: GDPR
    description: GDPR compliance endpoints (data export, deletion, consent)
  - name: Security
    description: Two-factor authentication, WebAuthn, and API key management
  - name: Permissions
    description: Permission checking and role management
  - name: Discord
    description: Discord integration settings and sync
  - name: Mining
    description: Mining operation tracking and management
  - name: Bounties
    description: Bounty board and bounty hunting
  - name: Recruitment
    description: Organization recruitment listings and applications

