# Activity Schemas
# Schema definitions for activity-related entities

Activity:
  type: object
  description: Basic activity entity (v1)
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
    type:
      type: string
    status:
      type: string
  required:
    - id
    - title
    - type
    - status

ActivityV2:
  type: object
  description: Activity entity with full details (v2)
  properties:
    id:
      type: string
      format: uuid
      description: Unique activity identifier
    title:
      type: string
      minLength: 3
      maxLength: 200
      description: Activity title
      example: Mining Operation Alpha
    description:
      type: string
      maxLength: 2000
      description: Detailed activity description
    type:
      type: string
      enum:
        - MISSION
        - CONTRACT
        - BOUNTY
        - EVENT
        - LFG
        - OPERATION
        - RECRUITMENT
        - JOB_LISTING
      description: Activity type
    status:
      type: string
      enum:
        - DRAFT
        - SCHEDULED
        - ACTIVE
        - COMPLETED
        - CANCELLED
      description: Current activity status
    organizationId:
      type: string
      format: uuid
      description: Parent organization ID
    creatorId:
      type: string
      format: uuid
      description: User who created the activity
    scheduledStartDate:
      type: string
      format: date-time
      description: Planned start time
    scheduledEndDate:
      type: string
      format: date-time
      description: Planned end time
    actualStartDate:
      type: string
      format: date-time
      description: Actual start time
    actualEndDate:
      type: string
      format: date-time
      description: Actual end time
    location:
      type: string
      maxLength: 200
      description: In-game location
      example: Stanton / Hurston / Lorville
    maxParticipants:
      type: integer
      minimum: 1
      maximum: 1000
      description: Maximum number of participants
    participantCount:
      type: integer
      minimum: 0
      description: Current participant count
    requirements:
      type: object
      description: Participation requirements
      properties:
        minRank:
          type: string
        requiredShipTypes:
          type: array
          items:
            type: string
        requiredRoles:
          type: array
          items:
            type: string
    rewards:
      type: object
      description: Activity rewards
      properties:
        aUEC:
          type: number
          minimum: 0
        reputation:
          type: number
        items:
          type: array
          items:
            type: string
    tags:
      type: array
      items:
        type: string
      description: Activity tags for filtering
    isPublic:
      type: boolean
      description: Whether the activity is publicly visible
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required:
    - id
    - title
    - type
    - status
    - organizationId
    - creatorId
    - createdAt
    - updatedAt

ActivityParticipant:
  type: object
  description: Activity participant information
  properties:
    userId:
      type: string
      format: uuid
    username:
      type: string
    displayName:
      type: string
    avatar:
      type: string
      format: uri
    role:
      type: string
      description: Role in the activity (leader, pilot, gunner, etc.)
    status:
      type: string
      enum:
        - INVITED
        - CONFIRMED
        - DECLINED
        - TENTATIVE
        - ATTENDED
        - NO_SHOW
      description: Participation status
    shipType:
      type: string
      description: Ship they plan to bring
    joinedAt:
      type: string
      format: date-time
    confirmedAt:
      type: string
      format: date-time
  required:
    - userId
    - username
    - role
    - status
    - joinedAt

CreateActivityRequest:
  type: object
  description: Request body for creating a new activity
  properties:
    title:
      type: string
      minLength: 3
      maxLength: 200
    description:
      type: string
      maxLength: 2000
    type:
      type: string
      enum:
        - MISSION
        - CONTRACT
        - BOUNTY
        - EVENT
        - LFG
        - OPERATION
        - RECRUITMENT
        - JOB_LISTING
    scheduledStartDate:
      type: string
      format: date-time
    scheduledEndDate:
      type: string
      format: date-time
    location:
      type: string
      maxLength: 200
    maxParticipants:
      type: integer
      minimum: 1
      maximum: 1000
    isPublic:
      type: boolean
      default: false
    tags:
      type: array
      items:
        type: string
  required:
    - title
    - type

ActivityListResponse:
  type: object
  description: Paginated list of activities
  properties:
    status:
      type: string
      enum: [success]
    data:
      type: array
      items:
        $ref: '#/ActivityV2'
    pagination:
      $ref: './common.yaml#/Pagination'
  required:
    - status
    - data
    - pagination
