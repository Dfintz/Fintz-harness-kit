# Notification Schemas

Notification:
  type: object
  description: A user notification
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    type:
      type: string
      enum:
        [
          info,
          warning,
          success,
          error,
          fleet_update,
          activity_invite,
          member_joined,
          member_left,
          role_changed,
          system,
        ]
    title:
      type: string
      example: 'New fleet assignment'
    message:
      type: string
      example: 'You have been assigned to Fleet Alpha'
    read:
      type: boolean
      default: false
    link:
      type: string
      description: Optional deep link URL
    metadata:
      type: object
      additionalProperties: true
      description: Additional context-specific data
    createdAt:
      type: string
      format: date-time
  required:
    - id
    - userId
    - type
    - title
    - message
    - read
    - createdAt

NotificationPreferences:
  type: object
  description: User notification preferences
  properties:
    email:
      type: boolean
      default: true
    push:
      type: boolean
      default: true
    inApp:
      type: boolean
      default: true
    categories:
      type: object
      properties:
        fleetUpdates:
          type: boolean
          default: true
        activityInvites:
          type: boolean
          default: true
        memberChanges:
          type: boolean
          default: true
        systemAlerts:
          type: boolean
          default: true
        discordSync:
          type: boolean
          default: true
  required:
    - email
    - push
    - inApp
