# User Schemas
# Schema definitions for user-related entities

User:
  type: object
  description: Basic user entity (v1 compatibility)
  properties:
    id:
      type: string
      format: uuid
      description: Unique user identifier
    username:
      type: string
      description: Username
    email:
      type: string
      format: email
      description: User email
    discordId:
      type: string
      description: Discord user ID
  required:
    - id
    - username
    - email
    - discordId

UserV2:
  type: object
  description: User entity with full details (v2)
  properties:
    id:
      type: string
      format: uuid
      description: Unique user identifier
    username:
      type: string
      minLength: 3
      maxLength: 50
      description: Unique username
    displayName:
      type: string
      maxLength: 100
      description: Display name
    email:
      type: string
      format: email
      description: Email address
    avatar:
      type: string
      format: uri
      description: Avatar URL
    discordId:
      type: string
      description: Discord user ID
    rsiHandle:
      type: string
      description: RSI (Roberts Space Industries) handle
    rsiVerified:
      type: boolean
      description: Whether RSI handle is verified
    timezone:
      type: string
      description: User's timezone
      example: America/New_York
    language:
      type: string
      description: Preferred language
      example: en
    bio:
      type: string
      maxLength: 500
      description: User biography
    location:
      type: string
      description: User's location
    playStyle:
      type: array
      items:
        type: string
        enum:
          - PVP
          - PVE
          - TRADING
          - MINING
          - EXPLORATION
          - BOUNTY_HUNTING
          - PIRACY
          - RACING
          - ROLEPLAY
      description: Preferred play styles
    availability:
      type: object
      description: Weekly availability
      properties:
        timezone:
          type: string
        schedule:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                start:
                  type: string
                  pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
                end:
                  type: string
                  pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
    shipCount:
      type: integer
      minimum: 0
      description: Number of ships owned
    organizationCount:
      type: integer
      minimum: 0
      description: Number of organizations
    activeOrgId:
      type: string
      format: uuid
      description: Currently active organization
    twoFactorEnabled:
      type: boolean
      description: Whether 2FA is enabled
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    lastLoginAt:
      type: string
      format: date-time
  required:
    - id
    - username
    - email
    - createdAt
    - updatedAt

UserProfile:
  type: object
  description: Public user profile
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    displayName:
      type: string
    avatar:
      type: string
      format: uri
    rsiHandle:
      type: string
    rsiVerified:
      type: boolean
    bio:
      type: string
    playStyle:
      type: array
      items:
        type: string
    shipCount:
      type: integer
    organizationCount:
      type: integer
  required:
    - id
    - username

UpdateUserRequest:
  type: object
  description: Request body for updating user profile
  properties:
    displayName:
      type: string
      maxLength: 100
    bio:
      type: string
      maxLength: 500
    timezone:
      type: string
    language:
      type: string
    location:
      type: string
    playStyle:
      type: array
      items:
        type: string
    availability:
      type: object

UserResponse:
  type: object
  description: Single user response
  properties:
    status:
      type: string
      enum: [success]
    data:
      $ref: '#/UserV2'
  required:
    - status
    - data
