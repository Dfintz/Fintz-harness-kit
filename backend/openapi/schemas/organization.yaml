# Organization Schemas
# Schema definitions for organization-related entities

Organization:
  type: object
  description: Basic organization entity (v1 compatibility)
  properties:
    id:
      type: string
      format: uuid
      description: Unique organization identifier
    name:
      type: string
      description: Organization name
    members:
      type: array
      items:
        type: string
      description: Organization member user IDs
  required:
    - id
    - name
    - members

OrganizationV2:
  type: object
  description: Organization entity with full details (v2)
  properties:
    id:
      type: string
      format: uuid
      description: Unique organization identifier
    name:
      type: string
      minLength: 3
      maxLength: 100
      description: Organization name
      example: United Earth Empire
    description:
      type: string
      maxLength: 1000
      description: Organization description
    spectrumId:
      type: string
      description: RSI Spectrum ID for the organization
    logo:
      type: string
      format: uri
      description: URL to organization logo
    banner:
      type: string
      format: uri
      description: URL to organization banner
    memberCount:
      type: integer
      minimum: 0
      description: Total member count
    fleetCount:
      type: integer
      minimum: 0
      description: Number of fleets
    shipCount:
      type: integer
      minimum: 0
      description: Total ships owned by members
    isVerified:
      type: boolean
      description: Whether the organization is RSI verified
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    settings:
      type: object
      description: Organization-specific settings
      properties:
        isPublic:
          type: boolean
          description: Whether the organization is publicly visible
        requireApproval:
          type: boolean
          description: Whether new members require approval
        defaultRole:
          type: string
          description: Default role for new members
  required:
    - id
    - name
    - createdAt
    - updatedAt

OrganizationMember:
  type: object
  description: Organization member with role information
  properties:
    userId:
      type: string
      format: uuid
    username:
      type: string
    displayName:
      type: string
    avatar:
      type: string
      format: uri
    role:
      type: string
      description: Member's role in the organization
      example: officer
    permissions:
      type: array
      items:
        type: string
      description: Granted permissions
    joinedAt:
      type: string
      format: date-time
    lastActiveAt:
      type: string
      format: date-time
    shipCount:
      type: integer
      minimum: 0
  required:
    - userId
    - username
    - role
    - joinedAt

OrganizationStatistics:
  type: object
  description: Organization statistics and metrics
  properties:
    memberCount:
      type: integer
      minimum: 0
    activeMembers:
      type: integer
      minimum: 0
      description: Members active in last 30 days
    fleetCount:
      type: integer
      minimum: 0
    totalShips:
      type: integer
      minimum: 0
    totalShipValue:
      type: number
      minimum: 0
      description: Estimated total ship value in aUEC
    activityCount:
      type: integer
      minimum: 0
      description: Activities in the last 30 days
    memberGrowth:
      type: number
      description: Member growth percentage (30 day)
    topRoles:
      type: array
      items:
        type: object
        properties:
          role:
            type: string
          count:
            type: integer
    membershipByMonth:
      type: array
      items:
        type: object
        properties:
          month:
            type: string
          count:
            type: integer
  required:
    - memberCount
    - fleetCount
    - totalShips
