# Ship Schemas
# Schema definitions for ship-related entities

Ship:
  type: object
  description: Basic ship entity
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    manufacturer:
      type: string
    model:
      type: string
  required:
    - id
    - name

ShipV2:
  type: object
  description: Ship entity with full details (v2)
  properties:
    id:
      type: string
      format: uuid
      description: Unique ship identifier
    name:
      type: string
      maxLength: 100
      description: Custom ship name
      example: "Stardust Runner"
    manufacturer:
      type: string
      description: Ship manufacturer
      example: Roberts Space Industries
    model:
      type: string
      description: Ship model name
      example: Constellation Andromeda
    role:
      type: string
      enum:
        - Combat
        - Transport
        - Mining
        - Exploration
        - Industrial
        - Support
        - Racing
        - Multi-role
      description: Primary ship role
    size:
      type: string
      enum:
        - small
        - medium
        - large
        - capital
      description: Ship size category
    crewMin:
      type: integer
      minimum: 1
      description: Minimum crew requirement
    crewMax:
      type: integer
      minimum: 1
      description: Maximum crew capacity
    cargoCapacity:
      type: integer
      minimum: 0
      description: Cargo capacity in SCU
    ownerId:
      type: string
      format: uuid
      description: Owner user ID
    organizationId:
      type: string
      format: uuid
      description: Organization ID (if org-owned)
    fleetId:
      type: string
      format: uuid
      description: Assigned fleet ID
    status:
      type: string
      enum:
        - ACTIVE
        - MAINTENANCE
        - DESTROYED
        - LOANED
        - STORED
      description: Current ship status
    location:
      type: string
      description: Current in-game location
    insurance:
      type: object
      description: Insurance information
      properties:
        type:
          type: string
          enum: [LTI, 10Y, 6M, 3M, NONE]
        expiresAt:
          type: string
          format: date-time
    loadout:
      type: object
      description: Ship loadout configuration
      properties:
        weapons:
          type: array
          items:
            type: string
        shields:
          type: array
          items:
            type: string
        components:
          type: array
          items:
            type: string
    purchaseDate:
      type: string
      format: date-time
      description: When the ship was acquired
    value:
      type: number
      minimum: 0
      description: Estimated value in aUEC
    imageUrl:
      type: string
      format: uri
      description: Ship image URL
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required:
    - id
    - manufacturer
    - model
    - ownerId
    - createdAt
    - updatedAt

ShipCatalogEntry:
  type: object
  description: Ship catalog entry (game data)
  properties:
    manufacturer:
      type: string
    model:
      type: string
    role:
      type: string
    size:
      type: string
    crewMin:
      type: integer
    crewMax:
      type: integer
    cargoCapacity:
      type: integer
    msrp:
      type: number
      description: Manufacturer suggested price in USD
    imageUrl:
      type: string
      format: uri
  required:
    - manufacturer
    - model

CreateShipRequest:
  type: object
  description: Request body for adding a new ship
  properties:
    name:
      type: string
      maxLength: 100
    manufacturer:
      type: string
    model:
      type: string
    fleetId:
      type: string
      format: uuid
    status:
      type: string
      enum: [ACTIVE, MAINTENANCE, STORED]
      default: ACTIVE
  required:
    - manufacturer
    - model

ShipListResponse:
  type: object
  description: Paginated list of ships
  properties:
    status:
      type: string
      enum: [success]
    data:
      type: array
      items:
        $ref: '#/ShipV2'
    pagination:
      $ref: './common.yaml#/Pagination'
  required:
    - status
    - data
    - pagination
