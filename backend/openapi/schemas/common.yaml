# Common Schemas
# Shared types used across the API

Pagination:
  type: object
  description: Pagination metadata for list responses
  properties:
    page:
      type: integer
      minimum: 1
      description: Current page number
      example: 1
    limit:
      type: integer
      minimum: 1
      maximum: 100
      description: Number of items per page
      example: 20
    total:
      type: integer
      minimum: 0
      description: Total number of items
      example: 150
    totalPages:
      type: integer
      minimum: 0
      description: Total number of pages
      example: 8
  required:
    - page
    - limit
    - total
    - totalPages

PaginatedResponse:
  type: object
  description: Generic paginated response wrapper
  properties:
    data:
      type: array
      items: {}
      description: Array of items
    pagination:
      $ref: '#/Pagination'
  required:
    - data
    - pagination

ApiError:
  type: object
  description: Standard API error response
  properties:
    status:
      type: string
      enum: [error]
      description: Response status
    code:
      type: string
      description: Machine-readable error code
      example: VALIDATION_ERROR
    message:
      type: string
      description: Human-readable error message
      example: Invalid request parameters
    details:
      type: array
      items:
        type: object
        properties:
          field:
            type: string
            description: Field that caused the error
          message:
            type: string
            description: Error message for the field
      description: Detailed validation errors
    timestamp:
      type: string
      format: date-time
      description: Error timestamp
  required:
    - status
    - code
    - message
    - timestamp

ApiResponse:
  type: object
  description: Standard API success response wrapper
  properties:
    status:
      type: string
      enum: [success]
      description: Response status
    data:
      description: Response data
    meta:
      type: object
      description: Additional metadata
  required:
    - status
    - data

HealthStatus:
  type: string
  enum:
    - healthy
    - degraded
    - unhealthy
  description: System health status indicator

SystemHealth:
  type: object
  description: System health check response
  properties:
    status:
      $ref: '#/HealthStatus'
    timestamp:
      type: string
      format: date-time
    uptime:
      type: number
      description: System uptime in seconds
    environment:
      type: string
      description: Current environment (development/production)
    database:
      type: string
      description: Database connection status
    services:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          status:
            $ref: '#/HealthStatus'
          latency:
            type: number
            description: Service latency in milliseconds
  required:
    - status
    - timestamp
