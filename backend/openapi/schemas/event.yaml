# Event Schemas

Event:
  type: object
  description: An event or scheduled activity
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
      example: 'Mining Operation Alpha'
    description:
      type: string
    organizationId:
      type: string
      format: uuid
    startDate:
      type: string
      format: date-time
    endDate:
      type: string
      format: date-time
    location:
      type: string
      example: 'Stanton System - Hurston'
    type:
      type: string
      enum: [mining, combat, trading, exploration, social, training, other]
    status:
      type: string
      enum: [draft, published, cancelled, completed]
    maxAttendees:
      type: integer
      minimum: 1
    currentAttendees:
      type: integer
      minimum: 0
    createdBy:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required:
    - id
    - title
    - organizationId
    - startDate
    - type
    - status

EventAttendee:
  type: object
  description: An event attendee record
  properties:
    id:
      type: string
      format: uuid
    eventId:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    status:
      type: string
      enum: [confirmed, tentative, declined, waitlisted]
    role:
      type: string
      example: 'pilot'
    joinedAt:
      type: string
      format: date-time
  required:
    - id
    - eventId
    - userId
    - status

