# Fleet Schemas
# Schema definitions for fleet-related entities

Fleet:
  type: object
  description: Basic fleet entity (v1 compatibility)
  properties:
    id:
      type: string
      format: uuid
      description: Unique fleet identifier
    name:
      type: string
      minLength: 3
      maxLength: 100
      description: Fleet name
    members:
      type: array
      items:
        type: string
      description: Fleet member user IDs
  required:
    - id
    - name
    - members

FleetV2:
  type: object
  description: Fleet entity with full details (v2)
  properties:
    id:
      type: string
      format: uuid
      description: Unique fleet identifier
    name:
      type: string
      minLength: 3
      maxLength: 100
      description: Fleet name
      example: Alpha Squadron
    description:
      type: string
      maxLength: 500
      description: Fleet description
    organizationId:
      type: string
      format: uuid
      description: Parent organization ID
    createdAt:
      type: string
      format: date-time
      description: Creation timestamp
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp
    memberCount:
      type: integer
      minimum: 0
      description: Number of members in the fleet
    shipCount:
      type: integer
      minimum: 0
      description: Total number of ships in the fleet
    totalCrewCapacity:
      type: integer
      minimum: 0
      description: Combined crew capacity of all ships
    totalCargoCapacity:
      type: integer
      minimum: 0
      description: Combined cargo capacity in SCU
    isActive:
      type: boolean
      description: Whether the fleet is currently active
  required:
    - id
    - name
    - organizationId
    - createdAt
    - updatedAt

FleetStatistics:
  type: object
  description: Aggregated fleet statistics for an organization
  properties:
    totalFleets:
      type: integer
      minimum: 0
      description: Total number of fleets
    totalMembers:
      type: integer
      minimum: 0
      description: Total unique members across all fleets
    totalShips:
      type: integer
      minimum: 0
      description: Total ships across all fleets
    totalValue:
      type: number
      minimum: 0
      description: Estimated total value in aUEC
    shipsByRole:
      type: object
      additionalProperties:
        type: integer
      description: Ship count grouped by role
      example:
        Combat: 15
        Transport: 8
        Mining: 5
    fleetsBySize:
      type: object
      additionalProperties:
        type: integer
      description: Fleet count grouped by size category
      example:
        small: 3
        medium: 5
        large: 2
  required:
    - totalFleets
    - totalMembers
    - totalShips

FleetComposition:
  type: object
  description: Detailed fleet composition analysis
  properties:
    fleetId:
      type: string
      format: uuid
    totalShips:
      type: integer
      minimum: 0
    totalCrew:
      type: integer
      minimum: 0
    totalCargo:
      type: integer
      minimum: 0
      description: Total cargo capacity in SCU
    byManufacturer:
      type: array
      items:
        type: object
        properties:
          manufacturer:
            type: string
          count:
            type: integer
          percentage:
            type: number
    byRole:
      type: array
      items:
        type: object
        properties:
          role:
            type: string
          count:
            type: integer
          percentage:
            type: number
    bySize:
      type: array
      items:
        type: object
        properties:
          size:
            type: string
            enum: [small, medium, large, capital]
          count:
            type: integer
          percentage:
            type: number
  required:
    - fleetId
    - totalShips

CreateFleetRequest:
  type: object
  description: Request body for creating a new fleet
  properties:
    name:
      type: string
      minLength: 3
      maxLength: 100
      description: Fleet name
    description:
      type: string
      maxLength: 500
      description: Optional fleet description
    members:
      type: array
      items:
        type: string
        format: uuid
      description: Initial member user IDs
  required:
    - name

UpdateFleetRequest:
  type: object
  description: Request body for updating a fleet
  properties:
    name:
      type: string
      minLength: 3
      maxLength: 100
      description: Updated fleet name
    description:
      type: string
      maxLength: 500
      description: Updated fleet description
    members:
      type: array
      items:
        type: string
        format: uuid
      description: Updated member user IDs

FleetListResponse:
  type: object
  description: Paginated list of fleets
  properties:
    status:
      type: string
      enum: [success]
    data:
      type: array
      items:
        $ref: '#/FleetV2'
    pagination:
      $ref: './common.yaml#/Pagination'
  required:
    - status
    - data
    - pagination

FleetResponse:
  type: object
  description: Single fleet response
  properties:
    status:
      type: string
      enum: [success]
    data:
      $ref: '#/FleetV2'
  required:
    - status
    - data
