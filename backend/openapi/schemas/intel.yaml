IntelOfficer:
  type: object
  properties:
    id:
      type: string
      format: uuid
    organizationId:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    rank:
      $ref: '#/IntelOfficerRank'
    accessLevel:
      $ref: '#/IntelAccessLevel'
    specializations:
      type: array
      items:
        type: string
      maxItems: 10
    notes:
      type: string
      maxLength: 1000
    isActive:
      type: boolean
      default: true
    appointedBy:
      type: string
      format: uuid
    appointedAt:
      type: string
      format: date-time
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required:
    - id
    - organizationId
    - userId
    - rank
    - accessLevel
    - isActive
    - appointedBy
    - appointedAt

AppointIntelOfficer:
  type: object
  properties:
    userId:
      type: string
      format: uuid
      description: ID of the user to appoint as officer
    rank:
      $ref: '#/IntelOfficerRank'
    accessLevel:
      $ref: '#/IntelAccessLevel'
    specializations:
      type: array
      items:
        type: string
        maxLength: 50
      maxItems: 10
    notes:
      type: string
      maxLength: 1000
  required:
    - userId
    - rank
    - accessLevel

UpdateIntelOfficer:
  type: object
  properties:
    rank:
      $ref: '#/IntelOfficerRank'
    accessLevel:
      $ref: '#/IntelAccessLevel'
    specializations:
      type: array
      items:
        type: string
        maxLength: 50
      maxItems: 10
    notes:
      type: string
      maxLength: 1000
    isActive:
      type: boolean

IntelAuditLog:
  type: object
  properties:
    id:
      type: string
      format: uuid
    organizationId:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    intelEntryId:
      type: string
      format: uuid
    action:
      $ref: '#/IntelAuditAction'
    description:
      type: string
    ipAddress:
      type: string
    userAgent:
      type: string
    severity:
      type: string
      enum: [info, warning, critical]
      default: info
    metadata:
      type: object
      properties:
        changes:
          type: object
        oldValues:
          type: object
        newValues:
          type: object
        affectedUsers:
          type: array
          items:
            type: string
        reason:
          type: string
        customData:
          type: object
    createdAt:
      type: string
      format: date-time
  required:
    - id
    - organizationId
    - userId
    - action
    - severity
    - createdAt
