# Intel Vault Schema Definitions

IntelClassification:
  type: string
  enum:
    - public
    - restricted
    - confidential
    - secret
    - top_secret
  description: |
    Classification level for Intel entries:
    - public: Accessible to all Intel officers
    - restricted: Accessible to all Intel officers
    - confidential: Requires Officer rank or above
    - secret: Requires Senior rank or above
    - top_secret: Only Chief officer and org owner

IntelCategory:
  type: string
  enum:
    - strategic
    - tactical
    - personnel
    - enemy
    - alliance
    - economic
    - technical
    - other
  description: Category of the Intel entry

IntelOfficerRank:
  type: string
  enum:
    - junior
    - officer
    - senior
    - lead
    - chief
  description: |
    Intel officer ranks (ascending order):
    - junior: Entry-level officer
    - officer: Standard officer
    - senior: Senior officer
    - lead: Lead officer
    - chief: Chief Intelligence Officer (only one per org)

IntelAccessLevel:
  type: string
  enum:
    - read
    - write
    - edit
    - delete
    - admin
  description: Access level for Intel operations

IntelAuditAction:
  type: string
  enum:
    - entry_created
    - entry_viewed
    - entry_updated
    - entry_deleted
    - entry_archived
    - entry_restored
    - officer_appointed
    - officer_promoted
    - officer_demoted
    - officer_removed
    - officer_access_changed
    - access_granted
    - access_denied
    - unauthorized_attempt
    - vault_accessed
    - export_performed
    - bulk_operation
  description: Type of audit action recorded

IntelAccessCheck:
  type: object
  properties:
    hasAccess:
      type: boolean
      description: Whether user has vault access
    reason:
      type: string
      description: Reason if access denied
    accessLevel:
      $ref: '#/IntelAccessLevel'
    isOwner:
      type: boolean
      description: Whether user is organization owner
    isIntelOfficer:
      type: boolean
      description: Whether user is an Intel officer
    officerRank:
      $ref: '#/IntelOfficerRank'
  required:
    - hasAccess

IntelEntry:
  type: object
  properties:
    id:
      type: string
      format: uuid
    organizationId:
      type: string
      format: uuid
    title:
      type: string
      minLength: 3
      maxLength: 200
    content:
      type: string
      minLength: 1
      maxLength: 50000
    classification:
      $ref: '#/IntelClassification'
    category:
      $ref: '#/IntelCategory'
    tags:
      type: array
      items:
        type: string
      maxItems: 20
    location:
      type: string
      maxLength: 200
    eventDate:
      type: string
      format: date-time
    isArchived:
      type: boolean
      default: false
    createdBy:
      type: string
      format: uuid
    updatedBy:
      type: string
      format: uuid
    metadata:
      type: object
      properties:
        attachments:
          type: array
          items:
            type: string
          maxItems: 10
        relatedEntries:
          type: array
          items:
            type: string
          maxItems: 20
        sources:
          type: array
          items:
            type: string
          maxItems: 10
        reliability:
          type: integer
          minimum: 1
          maximum: 5
        urgency:
          type: string
          enum: [low, medium, high, critical]
        expirationDate:
          type: string
          format: date-time
        customFields:
          type: object
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required:
    - id
    - organizationId
    - title
    - content
    - classification
    - category
    - createdBy
    - createdAt

