# Star Citizen Fleet Manager API - Bundled OpenAPI 3.1 Schema
# 
# This file contains all schema definitions bundled for type generation.
# Run: npx openapi-typescript openapi/bundled.yaml -o src/types/generated/api.ts

openapi: 3.1.0

info:
  title: Star Citizen Fleet Manager API
  version: 2.0.0
  description: Enterprise-grade fleet management platform for Star Citizen organizations.

servers:
  - url: http://localhost:3000
    description: Development server

components:
  schemas:
    # ============================================================================
    # Common Types
    # ============================================================================
    
    Pagination:
      type: object
      description: Pagination metadata for list responses
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number
        limit:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page
        total:
          type: integer
          minimum: 0
          description: Total number of items
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
    
    ApiError:
      type: object
      description: Standard API error response
      required:
        - status
        - code
        - message
        - timestamp
      properties:
        status:
          type: string
          enum: [error]
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        timestamp:
          type: string
          format: date-time
    
    HealthStatus:
      type: string
      enum: [healthy, degraded, unhealthy]
      description: System health status indicator
    
    # ============================================================================
    # Fleet Types
    # ============================================================================
    
    Fleet:
      type: object
      description: Basic fleet entity (v1 compatibility)
      required:
        - id
        - name
        - members
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 100
        members:
          type: array
          items:
            type: string
    
    FleetV2:
      type: object
      description: Fleet entity with full details (v2)
      required:
        - id
        - name
        - organizationId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        organizationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        memberCount:
          type: integer
          minimum: 0
        shipCount:
          type: integer
          minimum: 0
        totalCrewCapacity:
          type: integer
          minimum: 0
        totalCargoCapacity:
          type: integer
          minimum: 0
        isActive:
          type: boolean
    
    FleetStatistics:
      type: object
      description: Aggregated fleet statistics
      required:
        - totalFleets
        - totalMembers
        - totalShips
      properties:
        totalFleets:
          type: integer
          minimum: 0
        totalMembers:
          type: integer
          minimum: 0
        totalShips:
          type: integer
          minimum: 0
        totalValue:
          type: number
          minimum: 0
        shipsByRole:
          type: object
          additionalProperties:
            type: integer
        fleetsBySize:
          type: object
          additionalProperties:
            type: integer
    
    FleetComposition:
      type: object
      description: Detailed fleet composition analysis
      required:
        - fleetId
        - totalShips
      properties:
        fleetId:
          type: string
          format: uuid
        totalShips:
          type: integer
          minimum: 0
        totalCrew:
          type: integer
          minimum: 0
        totalCargo:
          type: integer
          minimum: 0
        byManufacturer:
          type: array
          items:
            type: object
            properties:
              manufacturer:
                type: string
              count:
                type: integer
              percentage:
                type: number
        byRole:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              count:
                type: integer
              percentage:
                type: number
        bySize:
          type: array
          items:
            type: object
            properties:
              size:
                type: string
                enum: [small, medium, large, capital]
              count:
                type: integer
              percentage:
                type: number
    
    CreateFleetRequest:
      type: object
      description: Request body for creating a new fleet
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        members:
          type: array
          items:
            type: string
            format: uuid
    
    UpdateFleetRequest:
      type: object
      description: Request body for updating a fleet
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        members:
          type: array
          items:
            type: string
            format: uuid
    
    # ============================================================================
    # Organization Types
    # ============================================================================
    
    Organization:
      type: object
      description: Basic organization entity
      required:
        - id
        - name
        - members
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        members:
          type: array
          items:
            type: string
    
    OrganizationV2:
      type: object
      description: Organization entity with full details (v2)
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        spectrumId:
          type: string
        logo:
          type: string
          format: uri
        banner:
          type: string
          format: uri
        memberCount:
          type: integer
          minimum: 0
        fleetCount:
          type: integer
          minimum: 0
        shipCount:
          type: integer
          minimum: 0
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        settings:
          type: object
          properties:
            isPublic:
              type: boolean
            requireApproval:
              type: boolean
            defaultRole:
              type: string
    
    OrganizationMember:
      type: object
      description: Organization member with role information
      required:
        - userId
        - username
        - role
        - joinedAt
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatar:
          type: string
          format: uri
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time
        shipCount:
          type: integer
          minimum: 0
    
    OrganizationStatistics:
      type: object
      description: Organization statistics and metrics
      required:
        - memberCount
        - fleetCount
        - totalShips
      properties:
        memberCount:
          type: integer
          minimum: 0
        activeMembers:
          type: integer
          minimum: 0
        fleetCount:
          type: integer
          minimum: 0
        totalShips:
          type: integer
          minimum: 0
        totalShipValue:
          type: number
          minimum: 0
        activityCount:
          type: integer
          minimum: 0
        memberGrowth:
          type: number
    
    # ============================================================================
    # Activity Types
    # ============================================================================
    
    ActivityType:
      type: string
      enum:
        - MISSION
        - CONTRACT
        - BOUNTY
        - EVENT
        - LFG
        - OPERATION
        - RECRUITMENT
        - JOB_LISTING
    
    ActivityStatus:
      type: string
      enum:
        - DRAFT
        - SCHEDULED
        - ACTIVE
        - COMPLETED
        - CANCELLED
    
    Activity:
      type: object
      description: Basic activity entity
      required:
        - id
        - title
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          $ref: '#/components/schemas/ActivityType'
        status:
          $ref: '#/components/schemas/ActivityStatus'
    
    ActivityV2:
      type: object
      description: Activity entity with full details (v2)
      required:
        - id
        - title
        - type
        - status
        - organizationId
        - creatorId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        type:
          $ref: '#/components/schemas/ActivityType'
        status:
          $ref: '#/components/schemas/ActivityStatus'
        organizationId:
          type: string
          format: uuid
        creatorId:
          type: string
          format: uuid
        scheduledStartDate:
          type: string
          format: date-time
        scheduledEndDate:
          type: string
          format: date-time
        actualStartDate:
          type: string
          format: date-time
        actualEndDate:
          type: string
          format: date-time
        location:
          type: string
          maxLength: 200
        maxParticipants:
          type: integer
          minimum: 1
          maximum: 1000
        participantCount:
          type: integer
          minimum: 0
        requirements:
          type: object
          properties:
            minRank:
              type: string
            requiredShipTypes:
              type: array
              items:
                type: string
            requiredRoles:
              type: array
              items:
                type: string
        rewards:
          type: object
          properties:
            aUEC:
              type: number
              minimum: 0
            reputation:
              type: number
            items:
              type: array
              items:
                type: string
        tags:
          type: array
          items:
            type: string
        isPublic:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    ParticipationStatus:
      type: string
      enum:
        - INVITED
        - CONFIRMED
        - DECLINED
        - TENTATIVE
        - ATTENDED
        - NO_SHOW
    
    ActivityParticipant:
      type: object
      description: Activity participant information
      required:
        - userId
        - username
        - role
        - status
        - joinedAt
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        avatar:
          type: string
          format: uri
        role:
          type: string
        status:
          $ref: '#/components/schemas/ParticipationStatus'
        shipType:
          type: string
        joinedAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
    
    CreateActivityRequest:
      type: object
      description: Request body for creating a new activity
      required:
        - title
        - type
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        type:
          $ref: '#/components/schemas/ActivityType'
        scheduledStartDate:
          type: string
          format: date-time
        scheduledEndDate:
          type: string
          format: date-time
        location:
          type: string
          maxLength: 200
        maxParticipants:
          type: integer
          minimum: 1
          maximum: 1000
        isPublic:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string
    
    # ============================================================================
    # Ship Types
    # ============================================================================
    
    ShipRole:
      type: string
      enum:
        - Combat
        - Transport
        - Mining
        - Exploration
        - Industrial
        - Support
        - Racing
        - Multi-role
    
    ShipSize:
      type: string
      enum: [small, medium, large, capital]
    
    ShipStatus:
      type: string
      enum:
        - ACTIVE
        - MAINTENANCE
        - DESTROYED
        - LOANED
        - STORED
    
    InsuranceType:
      type: string
      enum: [LTI, 10Y, 6M, 3M, NONE]
    
    Ship:
      type: object
      description: Basic ship entity
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        manufacturer:
          type: string
        model:
          type: string
    
    ShipV2:
      type: object
      description: Ship entity with full details (v2)
      required:
        - id
        - manufacturer
        - model
        - ownerId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        manufacturer:
          type: string
        model:
          type: string
        role:
          $ref: '#/components/schemas/ShipRole'
        size:
          $ref: '#/components/schemas/ShipSize'
        crewMin:
          type: integer
          minimum: 1
        crewMax:
          type: integer
          minimum: 1
        cargoCapacity:
          type: integer
          minimum: 0
        ownerId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        fleetId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ShipStatus'
        location:
          type: string
        insurance:
          type: object
          properties:
            type:
              $ref: '#/components/schemas/InsuranceType'
            expiresAt:
              type: string
              format: date-time
        loadout:
          type: object
          properties:
            weapons:
              type: array
              items:
                type: string
            shields:
              type: array
              items:
                type: string
            components:
              type: array
              items:
                type: string
        purchaseDate:
          type: string
          format: date-time
        value:
          type: number
          minimum: 0
        imageUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    CreateShipRequest:
      type: object
      description: Request body for adding a new ship
      required:
        - manufacturer
        - model
      properties:
        name:
          type: string
          maxLength: 100
        manufacturer:
          type: string
        model:
          type: string
        fleetId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ShipStatus'
    
    # ============================================================================
    # User Types
    # ============================================================================
    
    User:
      type: object
      description: Basic user entity
      required:
        - id
        - username
        - email
        - discordId
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        discordId:
          type: string
    
    PlayStyle:
      type: string
      enum:
        - PVP
        - PVE
        - TRADING
        - MINING
        - EXPLORATION
        - BOUNTY_HUNTING
        - PIRACY
        - RACING
        - ROLEPLAY
    
    UserV2:
      type: object
      description: User entity with full details (v2)
      required:
        - id
        - username
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          minLength: 3
          maxLength: 50
        displayName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        avatar:
          type: string
          format: uri
        discordId:
          type: string
        rsiHandle:
          type: string
        rsiVerified:
          type: boolean
        timezone:
          type: string
        language:
          type: string
        bio:
          type: string
          maxLength: 500
        location:
          type: string
        playStyle:
          type: array
          items:
            $ref: '#/components/schemas/PlayStyle'
        shipCount:
          type: integer
          minimum: 0
        organizationCount:
          type: integer
          minimum: 0
        activeOrgId:
          type: string
          format: uuid
        twoFactorEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
    
    UpdateUserRequest:
      type: object
      description: Request body for updating user profile
      properties:
        displayName:
          type: string
          maxLength: 100
        bio:
          type: string
          maxLength: 500
        timezone:
          type: string
        language:
          type: string
        location:
          type: string
        playStyle:
          type: array
          items:
            $ref: '#/components/schemas/PlayStyle'
    
    # ============================================================================
    # Authentication Types
    # ============================================================================
    
    LoginRequest:
      type: object
      description: Login request body
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 100
    
    LoginResponse:
      type: object
      description: Login response with tokens
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        user:
          $ref: '#/components/schemas/User'
    
    RefreshTokenRequest:
      type: object
      description: Refresh token request
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    
    RefreshTokenResponse:
      type: object
      description: Refresh token response
      required:
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

paths: {}
