<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Fringe Core — The fleet management platform for Star Citizen organizations. Fleet tracking, org management, bounty boards, trade logistics, and Discord integration."
    />
    <meta
      name="keywords"
      content="Star Citizen, fleet manager, organization, org management, fleet tracking, bounty board, trade logistics, Discord bot, Fringe Core"
    />
    <meta name="theme-color" content="#00d9ff" />
    <meta name="color-scheme" content="dark" />
    <!-- Open Graph (Facebook, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fringe Core" />
    <meta property="og:title" content="Fringe Core — Star Citizen Fleet Manager" />
    <meta
      property="og:description"
      content="The fleet management platform for Star Citizen organizations. Fleet tracking, org management, bounty boards, trade logistics, and Discord integration."
    />
    <meta property="og:url" content="https://fringecore.space/" />
    <meta property="og:image" content="https://fringecore.space/fringecore.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fringe Core — Star Citizen Fleet Manager" />
    <meta
      name="twitter:description"
      content="The fleet management platform for Star Citizen organizations. Fleet tracking, org management, and Discord integration."
    />
    <meta name="twitter:image" content="https://fringecore.space/fringecore.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Fringe Core — Star Citizen Fleet Manager</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <div id="root">
      <!-- Static loading indicator shown until React mounts -->
      <div
        id="app-loader"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #0a1628;
          color: #b0c4de;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        "
      >
        <svg width="48" height="48" viewBox="0 0 48 48" style="animation: spin 1s linear infinite">
          <circle
            cx="24"
            cy="24"
            r="20"
            fill="none"
            stroke="#00d9ff"
            stroke-width="4"
            stroke-dasharray="90 150"
            stroke-linecap="round"
          />
        </svg>
        <p style="margin-top: 16px; color: #8a9eb5">Loading...</p>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
