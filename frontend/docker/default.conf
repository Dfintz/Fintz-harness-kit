# Reject direct access — only allow Azure Front Door traffic
# AZURE_FD_ID is substituted at container startup via envsubst or sed
# If not set, all traffic is allowed (local dev / no Front Door)
map $http_x_azure_fdid $deny_non_fd {
    default                    1;
    "AZURE_FD_ID_PLACEHOLDER"  0;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow file uploads up to 10 MB (matches backend multer limit)
    client_max_body_size 10m;

    # Pin DNS to Azure platform resolver with IPv4 only.
    # The Container Apps environment occasionally returns AAAA records
    # whose IPv6 path is unreachable from the container, causing nginx
    # to mark the upstream temporarily disabled. ipv6=off avoids this.
    resolver 168.63.129.16 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Security headers
    set $frontend_csp "default-src 'self'; script-src 'self'; script-src-elem 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.fringecore.space wss://api.fringecore.space; frame-src 'self' https://verseguide.com https://snareplan.dolus.eu https://maps.adi.sc; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";

    # Block requests not coming through Front Door (skip if placeholder not substituted)
    if ($deny_non_fd) {
        return 403;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "$frontend_csp" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Hide server version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Proxy API requests to backend
    # Use a variable so nginx resolves the hostname at runtime via the
    # resolver above (IPv4 only) instead of caching the libc result at startup.
    location /api/ {
        set $api_backend "api.fringecore.space";
        proxy_pass https://$api_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host api.fringecore.space;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_cookie_domain api.fringecore.space .fringecore.space;
        proxy_cookie_path / /;
        proxy_ssl_server_name on;
    }

    # Public mobile APK downloads are proxied to backend API.
    # This preserves private blob storage while keeping a stable
    # user-facing URL under /mobile/*.apk.
    location ~ ^/mobile/(.+)$ {
        set $mobile_api_backend "api.fringecore.space";
        proxy_pass https://$mobile_api_backend/api/v2/mobile/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $mobile_api_backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_cookie_domain $mobile_api_backend .fringecore.space;
        proxy_cookie_path / /;
        proxy_ssl_server_name on;
    }

    # React Router support — serve index.html for SPA routes, never cached
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        # Repeat security headers (nginx doesn't inherit add_header into location blocks)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "$frontend_csp" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Service worker files must NEVER be cached — browser must always fetch latest
    # to pick up new precache manifests and avoid bad-precaching-response errors.
    location ~* ^/(sw\.js|workbox-[a-f0-9]+\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Cache static assets (hashed filenames make them safe to cache aggressively)
    # Exclude /api/ paths so image download proxy URLs (.png etc.) are handled
    # by the /api/ proxy location instead of being served as local files.
    location ~* ^/(?!api/)\S+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # No cache for HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "$frontend_csp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }
}
