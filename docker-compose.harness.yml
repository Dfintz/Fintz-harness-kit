# Harness sidecars — standalone Docker Compose for the harness-kit.
#
# Two optional always-on sidecars:
#   harness-dashboard  — regenerates the harness report on an interval and serves it over HTTP.
#   graph-refresh      — deterministic knowledge-graph refresh. Supports
#                        understand-anything and graphify backends via graph.provider.
#                        understand-anything requires the plugin checkout.
#
# Usage:
#   docker compose -f docker-compose.harness.yml --profile dashboard up -d --build harness-dashboard
#   # then open http://localhost:8099
#
#   UNDERSTAND_PLUGIN_ROOT=/abs/path/to/understand-anything-plugin \
#     docker compose -f docker-compose.harness.yml --profile graph-refresh up -d --build graph-refresh

services:
  harness-dashboard:
    build:
      context: .
      dockerfile: scripts/harness/Dockerfile.graph-refresh
    profiles:
      - dashboard
    working_dir: /workspace
    command:
      [
        "node",
        "scripts/harness/report-server.mjs",
        "--port",
        "8099",
        "--host",
        "0.0.0.0",
      ]
    environment:
      HARNESS_DASHBOARD_PORT: "8099"
      HARNESS_DASHBOARD_INTERVAL_SECONDS: ${HARNESS_DASHBOARD_INTERVAL_SECONDS:-60}
    ports:
      - "8099:8099"
    volumes:
      - ./:/workspace
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('node:http').get('http://127.0.0.1:8099/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Optional: deterministic knowledge-graph refresh sidecar.
  # Understand-Anything backend requires UNDERSTAND_PLUGIN_ROOT.
  graph-refresh:
    build:
      context: .
      dockerfile: scripts/harness/Dockerfile.graph-refresh
    profiles:
      - graph-refresh
    working_dir: /workspace
    environment:
      UNDERSTAND_PLUGIN_ROOT: /opt/understand-plugin
      HARNESS_GRAPH_PROVIDER: ${HARNESS_GRAPH_PROVIDER:-understand-anything}
      GRAPH_REFRESH_INTERVAL_SECONDS: ${GRAPH_REFRESH_INTERVAL_SECONDS:-600}
      GRAPH_REFRESH_RUN_ONCE: ${GRAPH_REFRESH_RUN_ONCE:-false}
      GRAPH_REFRESH_AUTO_COMMIT: ${GRAPH_REFRESH_AUTO_COMMIT:-false}
      # Bootstrap plugin dependencies into a writable runtime copy to avoid
      # cross-host node_modules/linker drift when the mounted plugin tree is read-only.
      GRAPH_REFRESH_BOOTSTRAP_PLUGIN: ${GRAPH_REFRESH_BOOTSTRAP_PLUGIN:-true}
      GRAPH_REFRESH_RUNTIME_PLUGIN_ROOT: ${GRAPH_REFRESH_RUNTIME_PLUGIN_ROOT:-/workspace/.cache/understand-plugin-runtime}
      # Large graph builds exceed Node's default heap; give headroom.
      NODE_OPTIONS: --max-old-space-size=8192
    volumes:
      - ./:/workspace
      - ${UNDERSTAND_PLUGIN_ROOT:-./.understand-anything-plugin-placeholder}:/opt/understand-plugin:ro
    command:
      [
        "sh",
        "-lc",
        "node scripts/harness/graph-refresh-loop.mjs --preflight-only --plugin-root /opt/understand-plugin && node scripts/harness/graph-refresh-loop.mjs --plugin-root /opt/understand-plugin",
      ]
