name: type-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TS7 cutover gate
        run: npm run ts7:ci-gate

      - name: Run TS7 probe
        run: npm run ts7:probe
        continue-on-error: true

      - name: Upload TS7 debt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts7-debt-report
          path: |
            .github/harness/runs/ts7-debt-report.json
            .github/harness/runs/ts7-debt-report.md
          if-no-files-found: warn

      - name: Run type check
        run: npm run type-check
