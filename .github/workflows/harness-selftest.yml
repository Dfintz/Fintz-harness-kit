name: harness self-tests

# Runs the kit's deterministic self-tests — no agent, no network, no install required.
# This is the regression gate for the harness engine, the domain packs, and the onboarding tooling.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: self-tests (Node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Core loops and self-tests need no dependencies; the MCP SDK is optional and not exercised here.
      - name: Run all self-tests
        run: node scripts/harness/selftest-all.mjs
      - name: Environment doctor (informational)
        run: node scripts/harness/doctor.mjs --quick --json
