name: harness maintenance

# Deterministic, unattended harness maintenance ("run without you") — no agent, no network, no
# install required. The task list lives in harness.config.json (schedule.tasks); this workflow just
# runs the runner on a weekly cron and writes a summary. A required task failing turns the run red;
# optional tasks stay informational.

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    name: scheduled harness maintenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Tasks use only the harness's own self-tests — no dependencies to install.
      - name: Run scheduled maintenance
        run: node scripts/harness/scheduled-maintenance.mjs
